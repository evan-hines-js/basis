<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gpu">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="16"/>

  <!-- Subtle background grid -->
  <g opacity="0.04" stroke="#38bdf8" stroke-width="0.5">
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!--
    LEFT VISUAL — the BASIS stack.

    Isometric projection:
      screen_x = 190 + (x - z) * 50
      screen_y = 180 + (x + z) * 25 - y * 55

    Bottom layer (y=0..0.1) — 2×2 grid of HOSTS (cyan), with amber GPU
    dots on each tile. Middle layer (y=0.9..1.4) — three VM cubes
    (purple) floating above selected hosts. Top — a controller node that
    streams commands down to each VM.
  -->

  <!-- ════════════ CONTROLLER NODE (top) ════════════ -->
  <g filter="url(#glow)">
    <polygon points="190,44 202,55 190,66 178,55" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="190" cy="55" r="4" fill="#22d3ee"/>
  </g>

  <!-- Dashed command paths: controller → VMs -->
  <g stroke="#334155" stroke-width="1" stroke-dasharray="2,4" opacity="0.45">
    <line x1="190" y1="66" x2="190" y2="112"/>
    <line x1="190" y1="66" x2="240" y2="137"/>
    <line x1="190" y1="66" x2="140" y2="137"/>
  </g>

  <!-- Animated dots tracing controller → VM streams -->
  <circle r="2.5" fill="#22d3ee" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3s" repeatCount="indefinite" path="M190,66 L190,112"/>
  </circle>
  <circle r="2.5" fill="#22d3ee" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="0.8s" path="M190,66 L240,137"/>
  </circle>
  <circle r="2.5" fill="#22d3ee" opacity="0.9" filter="url(#glow)">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="1.6s" path="M190,66 L140,137"/>
  </circle>

  <!-- ════════════ HOST TILES (y=0..0.1) ════════════ -->

  <!-- Inter-host mesh (faint dashed) -->
  <g stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="3,5" opacity="0.2">
    <line x1="190" y1="201" x2="240" y2="226"/>
    <line x1="190" y1="201" x2="140" y2="226"/>
    <line x1="240" y1="226" x2="190" y2="251"/>
    <line x1="140" y1="226" x2="190" y2="251"/>
  </g>

  <!-- Host A (gx=0, gz=0) -->
  <g>
    <polygon points="232,196 232,201 190,222 190,217"
             fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1"/>
    <polygon points="148,196 190,217 190,222 148,201"
             fill="#38bdf8" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="190,175 232,196 190,217 148,196"
             fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.9" stroke-width="1.5"/>
  </g>

  <!-- Host B (gx=1, gz=0) -->
  <g>
    <polygon points="282,221 282,226 240,247 240,242"
             fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1"/>
    <polygon points="198,221 240,242 240,247 198,226"
             fill="#38bdf8" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="240,200 282,221 240,242 198,221"
             fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.9" stroke-width="1.5"/>
  </g>

  <!-- Host C (gx=0, gz=1) -->
  <g>
    <polygon points="182,221 182,226 140,247 140,242"
             fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1"/>
    <polygon points="98,221 140,242 140,247 98,226"
             fill="#38bdf8" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="140,200 182,221 140,242 98,221"
             fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.9" stroke-width="1.5"/>
  </g>

  <!-- Host D (gx=1, gz=1) -->
  <g>
    <polygon points="232,246 232,251 190,272 190,267"
             fill="#38bdf8" fill-opacity="0.08" stroke="#38bdf8" stroke-opacity="0.5" stroke-width="1"/>
    <polygon points="148,246 190,267 190,272 148,251"
             fill="#38bdf8" fill-opacity="0.05" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
    <polygon points="190,225 232,246 190,267 148,246"
             fill="#38bdf8" fill-opacity="0.15" stroke="#38bdf8" stroke-opacity="0.9" stroke-width="1.5"/>
  </g>

  <!-- GPU dots on each host — 2 per tile, amber, pulsing -->
  <g filter="url(#glow-gpu)">
    <!-- Host A -->
    <circle cx="182" cy="196" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="198" cy="204" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <!-- Host B -->
    <circle cx="232" cy="221" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="248" cy="229" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <!-- Host C -->
    <circle cx="132" cy="221" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="1;0.6;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="148" cy="229" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Host D -->
    <circle cx="182" cy="246" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="198" cy="254" r="2.8" fill="url(#amber)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ════════════ VM CUBES (y=0.9..1.4) ════════════ -->

  <!-- VM 1 (over Host A) -->
  <g filter="url(#glow)">
    <polygon points="165,124 190,137 190,164 165,152"
             fill="#818cf8" fill-opacity="0.2" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="215,124 215,152 190,164 190,137"
             fill="#818cf8" fill-opacity="0.25" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="190,112 215,124 190,137 165,124"
             fill="#818cf8" fill-opacity="0.45" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>

  <!-- VM 2 (over Host B) -->
  <g filter="url(#glow)">
    <polygon points="215,149 240,162 240,189 215,176"
             fill="#818cf8" fill-opacity="0.2" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="265,149 265,176 240,189 240,162"
             fill="#818cf8" fill-opacity="0.25" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="240,137 265,149 240,162 215,149"
             fill="#818cf8" fill-opacity="0.45" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>

  <!-- VM 3 (over Host C) -->
  <g filter="url(#glow)">
    <polygon points="115,149 140,162 140,189 115,176"
             fill="#818cf8" fill-opacity="0.2" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="165,149 165,176 140,189 140,162"
             fill="#818cf8" fill-opacity="0.25" stroke="#a5b4fc" stroke-opacity="0.6" stroke-width="1"/>
    <polygon points="140,137 165,149 140,162 115,149"
             fill="#818cf8" fill-opacity="0.45" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>

  <!-- ════════════ DIVIDER ════════════ -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="#334155" stroke-width="1" stroke-dasharray="2,6"/>

  <!-- ════════════ RIGHT SIDE: BRANDING ════════════ -->

  <!-- Logo mark: three stacked isometric slabs (a plinth / foundation),
       with GPU dots on the top slab. -->
  <g transform="translate(600, 110)" filter="url(#glow-strong)">
    <!-- Bottom slab -->
    <polygon points="40,-2 40,0 0,20 0,18"
             fill="#38bdf8" fill-opacity="0.25" stroke="#38bdf8" stroke-width="1.2"/>
    <polygon points="-40,-2 0,18 0,20 -40,0"
             fill="#38bdf8" fill-opacity="0.18" stroke="#38bdf8" stroke-opacity="0.7" stroke-width="1.2"/>
    <polygon points="0,-22 40,-2 0,18 -40,-2"
             fill="#38bdf8" fill-opacity="0.3" stroke="#38bdf8" stroke-width="1.6"/>

    <!-- Middle slab -->
    <polygon points="28,-5 28,-2 0,12 0,9"
             fill="#818cf8" fill-opacity="0.25" stroke="#818cf8" stroke-width="1.2"/>
    <polygon points="-28,-5 0,9 0,12 -28,-2"
             fill="#818cf8" fill-opacity="0.18" stroke="#818cf8" stroke-opacity="0.7" stroke-width="1.2"/>
    <polygon points="0,-19 28,-5 0,9 -28,-5"
             fill="url(#accent)" fill-opacity="0.25" stroke="#818cf8" stroke-width="1.5"/>

    <!-- Top slab -->
    <polygon points="16,-8 16,-6 0,2 0,0"
             fill="#c084fc" fill-opacity="0.25" stroke="#c084fc" stroke-width="1"/>
    <polygon points="-16,-8 0,0 0,2 -16,-6"
             fill="#c084fc" fill-opacity="0.18" stroke="#c084fc" stroke-opacity="0.7" stroke-width="1"/>
    <polygon points="0,-16 16,-8 0,0 -16,-8"
             fill="url(#accent)" fill-opacity="0.35" stroke="#c084fc" stroke-width="1.5"/>

    <!-- GPU dots on top slab -->
    <circle cx="-5" cy="-10" r="1.8" fill="url(#amber)" filter="url(#glow-gpu)"/>
    <circle cx="5" cy="-6" r="1.8" fill="url(#amber)" filter="url(#glow-gpu)"/>

    <!-- Center accent -->
    <circle cx="0" cy="-8" r="3" fill="url(#accent)" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="4">BASIS</text>

  <!-- Tagline -->
  <text x="600" y="206" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">hypervisor substrate</text>
  <text x="600" y="222" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">for GPU-first clusters</text>

  <!-- Feature pills -->
  <g transform="translate(600, 246)">
    <rect x="-170" y="0" width="100" height="24" rx="12" fill="#38bdf8" fill-opacity="0.1" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="-120" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">BasisCluster</text>

    <rect x="-50" y="0" width="100" height="24" rx="12" fill="#818cf8" fill-opacity="0.1" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="0" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#818cf8">BasisMachine</text>

    <rect x="70" y="0" width="100" height="24" rx="12" fill="#c084fc" fill-opacity="0.1" stroke="#c084fc" stroke-opacity="0.3" stroke-width="1"/>
    <text x="120" y="16" text-anchor="middle" font-family="monospace" font-size="9" fill="#c084fc">MachineTemplate</text>
  </g>

  <!-- Feature list -->
  <g font-family="monospace" font-size="11" fill="#94a3b8">
    <text x="488" y="302"><tspan fill="#38bdf8">&gt;</tspan> cloud-hypervisor VMs</text>
    <text x="488" y="322"><tspan fill="#818cf8">&gt;</tspan> VFIO PCI passthrough</text>
    <text x="488" y="342"><tspan fill="#c084fc">&gt;</tspan> NVLink-aware scheduler</text>
    <text x="488" y="362"><tspan fill="#22d3ee">&gt;</tspan> CAPI infrastructure provider</text>
  </g>
</svg>
