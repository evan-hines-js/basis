# Example basis-controller config. Install on the single host that will
# run the controller process.
apiVersion: basis.dev/v1alpha1
kind: BasisController
metadata:
  name: primary
spec:
  listen: "0.0.0.0:7443"
  dataDir: /var/lib/basis
  tls:
    cert: /etc/basis/tls/controller.crt
    key: /etc/basis/tls/controller.key
    ca: /etc/basis/tls/ca.crt
  network:
    # Overlay space — every tree (trust domain) carves a disjoint
    # sub-CIDR out of this supernet. Does NOT need to match the
    # physical LAN; VMs reach it via VXLAN.
    treeSupernet: 10.100.0.0/16
    # Named LAN-routable pools. A cluster's `apiserverVipPool` picks
    # which pool its apiserver VIP comes from (and consequently the
    # source for its edge-NIC VMs). Empty `apiserverVipPool` keeps
    # the VIP inside the tree overlay (nested clusters).
    pools:
      - name: cell-internal
        cidr: 192.168.1.0/24
        gateway: 192.168.1.1
        rangeStart: 192.168.1.240
        rangeEnd: 192.168.1.250
  # CPU overcommit: assigned vCPU is allowed to exceed the host's
  # logical CPU count by this factor. Memory and disk stay strict.
  cpuOvercommitRatio: 4.0
