# Example basis-controller config. Install on the single host that will
# run the controller process.
apiVersion: basis.dev/v1alpha1
kind: BasisController
metadata:
  name: primary
spec:
  listen: "0.0.0.0:7443"
  dataDir: /var/lib/basis
  tls:
    cert: /etc/basis/tls/controller.crt
    key: /etc/basis/tls/controller.key
    ca: /etc/basis/tls/ca.crt
  ipPools:
    - name: default
      cidr: 192.168.1.0/24
      gateway: 192.168.1.1
      # Both sub-ranges must sit OUTSIDE your router's DHCP range and
      # must not overlap with each other. The controller auto-picks VM
      # IPs from `vmRange` and control-plane VIPs from `vipRange`. Size
      # `vipRange` to the number of clusters you expect to run at once
      # (one VIP per cluster).
      vmRange:
        start: 192.168.1.220
        end: 192.168.1.250
      vipRange:
        start: 192.168.1.210
        end: 192.168.1.219
  # CPU overcommit: assigned vCPU is allowed to exceed the host's logical
  # CPU count by this factor. Memory and disk stay strict. 1.0 = no
  # overcommit. 4.0 is typical for k8s workload VMs.
  cpuOvercommitRatio: 4.0
