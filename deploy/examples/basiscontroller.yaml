# Example basis-controller config. Install on the single host that will
# run the controller process.
apiVersion: basis.dev/v1alpha1
kind: BasisController
metadata:
  name: primary
spec:
  listen: "0.0.0.0:7443"
  dataDir: /var/lib/basis
  tls:
    cert: /etc/basis/tls/controller.crt
    key: /etc/basis/tls/controller.key
    ca: /etc/basis/tls/ca.crt
  network:
    # Overlay space — every cluster carves a disjoint sub-CIDR out of
    # this supernet. Does NOT need to match the physical LAN; VMs
    # reach it via VXLAN.
    clusterSupernet: 10.100.0.0/16
    # Default per-cluster CIDR prefix length. /24 fits ~32 hosts (the
    # `bridgeReserve` carve at the bottom) plus ~220 VM IPs. Widen
    # for larger clusters.
    clusterPrefix: 24
    # Number of addresses at the bottom of each cluster's CIDR
    # reserved for per-host bridge IPs. One per hypervisor carrying a
    # VM in the cluster.
    bridgeReserve: 32
    # Named pools. A cluster's `externalIpPool` picks which pool its
    # LoadBalancer Service block (and apiserver VIP, when
    # `apiserverVisibility: Public`) is carved from. Required: every
    # cluster names exactly one.
    #
    # Pool `scope` decides dataplane treatment:
    #   * lan (default) — LAN-routable. Agent advertises via BGP and
    #     proxy-ARPs onto the uplink. Required for any cluster with
    #     `apiserverVisibility: Public`.
    #   * tree          — cell-internal. Agent installs bridge routes
    #     on every host so cross-cluster traffic flows over the
    #     overlay, but does not proxy-ARP and does not advertise via
    #     BGP. The LAN cannot reach these VIPs. Carve from RFC1918
    #     space outside the LAN.
    pools:
      # LAN-routable. Hosts public apiserver VIPs and externally-
      # reachable LB Service blocks. Required: at least one pool
      # in the cell must be LAN-scoped.
      - name: cell-public
        cidr: 192.168.1.192/26      # 64 addrs → 62 allocatable
      # Cell-internal. Hosts private workload clusters' LB blocks
      # without exposing them on the LAN.
      - name: cell-internal
        cidr: 172.20.0.0/24         # 256 addrs → 254 allocatable
        scope: tree
    # Cell-wide default for the per-cluster Cilium LB Service block.
    # Must be a power of two. Override per-cluster via
    # `BasisCluster.spec.externalServiceIps` for the rare case.
    defaultExternalServiceIps: 16
  # CPU overcommit: assigned vCPU is allowed to exceed the host's
  # logical CPU count by this factor. Memory and disk stay strict.
  cpuOvercommitRatio: 4.0
  # Cell BGP route reflector. basis-controller drives the local
  # `holod` (installed by ansible) via gRPC; routerId is the
  # controller's underlay LAN IP that every agent's BGP speaker
  # peers to.
  bgp:
    asn: 64512
    routerId: 10.0.0.1
  # Safety policies. Defaults are conservative; flip individual
  # fields ON only when you understand the failure mode.
  safety:
    # When ON, the controller automatically reconciles agent
    # inventory against its DB on register — synthesises tombstones
    # for kernel state the DB doesn't track, and rolls DB rows the
    # agent doesn't have into the standard teardown pipeline. Useful
    # in dev/CI where wiping controller.db is the reset workflow.
    #
    # When OFF (default), the controller logs every discrepancy
    # loudly but changes nothing. Production safety: a DB loss must
    # not cause every running VM to be auto-deleted on reconnect.
    autoReconcileOrphanInventory: false
