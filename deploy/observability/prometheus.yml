global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # Basis controller - the one process on each cluster. Default target
  # is the Docker host loopback so a locally-running controller on 9443
  # is scraped automatically. Edit for a remote controller.
  - job_name: basis-controller
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.0.0.206:9443
        labels:
          service: basis-controller

  # Basis agents - one target per host on port 9444 (configurable via
  # spec.metricsListen in the Host YAML). One static_configs group per
  # host so each can carry its own `host=` label; the controller's
  # cluster-level metrics already self-label by host id, but the
  # agent-level metrics (basis_agent_*) don't, so this label is what
  # makes per-host panels work in Grafana.
  - job_name: basis-agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.0.0.206:9444
        labels:
          service: basis-agent
          host: poweredge-md
      - targets:
          - 10.0.0.97:9444
        labels:
          service: basis-agent
          host: poweredge-lg
