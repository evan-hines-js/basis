global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

scrape_configs:
  # Basis controller - the one process on each cluster. Default target
  # is the Docker host loopback so a locally-running controller on 9443
  # is scraped automatically. Edit for a remote controller.
  - job_name: basis-controller
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.0.0.206:9443
        labels:
          service: basis-controller

  # Basis agents - one target per host on port 9444 (configurable via
  # spec.metricsListen in the Host YAML). Fill in the list below or
  # replace with a file_sd_config once an inventory file exists.
  - job_name: basis-agents
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.0.0.206:9444
        labels:
          service: basis-agent
