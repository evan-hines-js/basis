# Local observability stack for the Basis control plane.
#
#   docker compose up -d
#   open http://localhost:3000      # Grafana (anonymous admin)
#   open http://localhost:9090      # Prometheus
#
# By default, Prometheus scrapes basis-controller at
# host.docker.internal:9443 (the Docker-host's loopback), so pointing at
# a locally-running controller just works. For a remote controller, edit
# prometheus.yml or set BASIS_CONTROLLER_TARGET before `up`.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: basis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: basis-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_DEFAULT_THEME: "dark"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"

volumes:
  prometheus-data:
  grafana-data:
