---
# poweredge-md (10.0.0.206).
#
# Rootfs thin pool (basis VG): sdb + sdc — 2× 186 GiB enterprise PLP
# SSDs spanned in one VG (~373 GiB). The other two PLP drives (sdd,
# sde) are split out as one-VG-per-device fast-pool members. The OS
# lives on sda (pve VG); sdf is a 4 TB bulk drive (currently unused
# by basis); sdg is a removable USB stick.
#
# Data pool: one `fast` pool with two PLP devices (one VG per device,
# per the one-VG-per-device rule). ~373 GiB raw across two devices.
basis_lvm_devices:
  - /dev/sdb
  - /dev/sdc

basis_storage_pools:
  - name: fast
    backend: lvm-linear
    labels:
      tier: fast
      medium: sas
    devices:
      - id: sdd
        device: /dev/sdd
        vg: basis-fast-sdd
        sizeGib: 186
      - id: sde
        device: /dev/sde
        vg: basis-fast-sde
        sizeGib: 186

# Network config (cluster_supernet, pools, default_external_service_ips)
# lives in group_vars/all.yml — it's a cell-wide concern, not per-host.

# Rootfs lives on enterprise PLP SSDs — the right surface for the
# CP's etcd. Workers prefer `tier: bulk` (node-1) and only land here
# if node-1 has no capacity.
basis_host_labels:
  tier: fast
