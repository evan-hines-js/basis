---
# poweredge-md (10.0.0.206).
#
# Rootfs thin pool (basis VG): four 186 GB enterprise SSDs (sdb-sde),
# previously held `ent-zfspool`, now a single LVM-thin pool. The OS
# lives on sda (pve-root); sdf/sdg are not part of the pool.
#
# Data VG (basis-data): backed by `/dev/pve/basis-data`, a thick LV
# carved out of the OS disk's `pve` VG after destroying the unused
# `pve-data` thinpool that PVE auto-provisions but we never used.
# Gives ~320 GiB of data capacity, sized to fit a 250 GiB-class
# worker dataDisk plus headroom. Sparse loopback was a temporary
# fixture that capped data placement at 120 GiB.
#
# First-apply prep (run once on the host):
#   zpool destroy ent-zfspool
#   wipefs -a /dev/sdb /dev/sdc /dev/sdd /dev/sde
#   lvremove -y pve/data
#   lvcreate -n basis-data -L 320G pve
basis_lvm_devices:
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde

basis_lvm_data_devices:
  - /dev/pve/basis-data

# Network config (cluster_supernet, pools, default_external_service_ips)
# lives in group_vars/all.yml — it's a cell-wide concern, not per-host.
# Only override here for fields that genuinely vary across hosts in
# the same cell (none today).

# Enterprise SSDs with PLP — the right tier for control planes.
# Workers go to `tier: slow` hosts (the NUC) and only fall back here
# if their requires is satisfied (which it isn't by default).
basis_host_labels:
  tier: fast
