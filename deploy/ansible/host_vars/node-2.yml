---
# poweredge-md (10.0.0.206): four 186 GB enterprise SSDs (sdb-sde)
# previously held `ent-zfspool`, now repurposed as a single LVM-thin
# pool for VM disks. The OS lives on sda (pve-root); sdf/sdg are not
# part of the pool.
#
# `wipefs -a /dev/sdb /dev/sdc /dev/sdd /dev/sde` was run after
# `zpool destroy ent-zfspool` before the first apply.
basis_lvm_devices:
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde

# basis-data VG: e2e backed by a 120G sparse loopback on the OS root
# (sda). The four SSDs above are the rootfs thin pool; sdf/sdg are
# untouched and reserved for other PVE workloads. Sparse loopback
# tracks actual bluestore writes (near-zero in e2e). Production hosts
# would list a dedicated NVMe / partition here instead.
basis_lvm_data_devices:
  - file: /var/lib/basis/basis-data.img
    size: 120G

# Network config (cluster_supernet, pools, default_external_service_ips)
# lives in group_vars/all.yml — it's a cell-wide concern, not per-host.
# Only override here for fields that genuinely vary across hosts in
# the same cell (none today).

# Enterprise SSDs with PLP — the right tier for control planes.
# Workers go to `tier: slow` hosts (the NUC) and only fall back here
# if their requires is satisfied (which it isn't by default).
basis_host_labels:
  tier: fast
