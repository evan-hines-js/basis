---
# poweredge-md (10.0.0.206): four 186 GB enterprise SSDs (sdb-sde)
# previously held `ent-zfspool`, now repurposed as a single LVM-thin
# pool for VM disks. The OS lives on sda (pve-root); sdf/sdg are not
# part of the pool.
#
# `wipefs -a /dev/sdb /dev/sdc /dev/sdd /dev/sde` was run after
# `zpool destroy ent-zfspool` before the first apply.
basis_lvm_devices:
  - /dev/sdb
  - /dev/sdc
  - /dev/sdd
  - /dev/sde

# One LAN pool on the routed lab subnet. VM primary IPs come from
# `tree_supernet` (overlay), so only VIPs need LAN addresses.
basis_network:
  tree_supernet: 10.100.0.0/16
  pools:
    - name: cell-public
      cidr: 10.0.0.0/24
      gateway: 10.0.0.1
      range_start: 10.0.0.200
      range_end: 10.0.0.205
