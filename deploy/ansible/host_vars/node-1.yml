---
# poweredge-lg (10.0.0.97).
#
# Rootfs thin pool (basis VG): /dev/sdf2 — Crucial BX500 1TB SATA SSD,
# tail of the disk after a 500 GiB sdf1 carved out for PVE's `data`
# thin pool (PBS / build VM / template). Consumer-grade, no PLP.
# That's only acceptable because the homelab runs 1 CP replica
# pinned to node-2 (PLP rootfs); workers landing here keep etcd off
# the consumer disk. basis VG is created manually by
# scripts/dev/storage-reorg-node1.sh; basis-prereqs materializes the
# thin pool inside it.
#
# Data pool: one `fast` pool with all four PLP enterprise SSDs
# (sda/sdc/sdd/sde, ~744 GiB raw). One VG per device, per the
# one-VG-per-device rule. Previously these were pooled in PVE's
# `ent-zfspool`; freed by storage-reorg-node1.sh.
basis_lvm_devices:
  - /dev/sdf2

basis_storage_pools:
  - name: fast
    backend: lvm-linear
    labels:
      tier: fast
      medium: sata
    devices:
      - id: sda
        device: /dev/sda
        vg: basis-fast-sda
        sizeGib: 186
      - id: sdc
        device: /dev/sdc
        vg: basis-fast-sdc
        sizeGib: 186
      - id: sdd
        device: /dev/sdd
        vg: basis-fast-sdd
        sizeGib: 186
      - id: sde
        device: /dev/sde
        vg: basis-fast-sde
        sizeGib: 186

# Host label characterizes rootfs class for VM placement: `bulk`
# means etcd-class workloads should not land here. The data-pool
# label (`tier: fast` above) is what dataDisk selectors match
# against, so workers can still use this host's PLP capacity.
basis_host_labels:
  tier: bulk
