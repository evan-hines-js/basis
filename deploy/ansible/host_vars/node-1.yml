---
# 10.0.0.97: PVE host. /dev/sdf (931 GiB) sits in PVE's `data` VG but
# the storage.cfg pins that VG to a different node — so on this host
# the drive is idle. We claim the whole disk for basis.
#
# First-apply prep (run once on the host):
#   vgremove -y data
#   wipefs -a /dev/sdf
basis_lvm_devices:
  - /dev/sdf

# Single SATA drive shared with PVE — only good enough for workers.
# CP with `prefers: tier=fast` falls back here if no fast host is up;
# workers with `requires: tier=slow` land here exclusively.
basis_host_labels:
  tier: slow
