[defaults]
inventory = ./inventory.ini
roles_path = ./roles
host_key_checking = False
stdout_callback = default
# Human-readable output — default yaml callback turns `-vv` into a wall of
# noise and hides the actual command failures.
display_skipped_hosts = False
# Vault password file. Override per-user with ANSIBLE_VAULT_PASSWORD_FILE
# or pass --ask-vault-pass on the command line. Gitignored (see basis
# .gitignore) because the local dev password is weak.
vault_password_file = ~/.basis-vault-pass

[ssh_connection]
pipelining = True
