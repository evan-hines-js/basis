---
- name: daemon reload
  ansible.builtin.systemd:
    daemon_reload: true

# SIGHUP path — applies controllerEndpoint changes live, logs a warning
# for immutable-field changes. Used for cert/config updates.
- name: reload basis-agent
  ansible.builtin.systemd:
    name: basis-agent
    state: reloaded

# Full restart. Used for binary updates and network/TLS changes.
# VMs survive because they run as independent systemd scopes.
- name: restart basis-agent
  ansible.builtin.systemd:
    name: basis-agent
    state: restarted
