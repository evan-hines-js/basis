---
# iputils-arping provides the `arping` binary the agent shells out to
# after installing a proxy-ARP entry on the uplink. The unsolicited
# ARP-reply burst (`arping -A`) collapses LAN-side ARP-cache
# convergence from the kernel's ~60s default TTL down to one packet
# round-trip on owner-change reconciles. Without it, single-responder
# proxy-ARP still works but takes a full TTL to fail over. Cache
# refresh is owned by `basis-prereqs` (which already tolerates the
# PVE enterprise-repo 401); we just install from whatever's there.
- name: Ensure iputils-arping is installed
  ansible.builtin.package:
    name: iputils-arping
    state: present

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ basis_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ basis_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure TLS directory exists
  ansible.builtin.file:
    path: "{{ basis_tls_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Copy basis-agent binary
  ansible.builtin.copy:
    src: "{{ basis_binary_dir }}/basis-agent"
    dest: "{{ basis_bin_dir }}/basis-agent"
    owner: root
    group: root
    mode: "0755"
  notify: restart basis-agent

- name: Install CA cert
  ansible.builtin.copy:
    src: "{{ basis_pki_dir }}/ca.crt"
    dest: "{{ basis_tls_dir }}/ca.crt"
    owner: root
    group: root
    mode: "0644"
  notify: reload basis-agent

- name: Install agent client cert
  ansible.builtin.copy:
    src: "{{ basis_pki_dir }}/agent-{{ inventory_hostname }}.crt"
    dest: "{{ basis_tls_dir }}/agent.crt"
    owner: root
    group: root
    mode: "0644"
  notify: reload basis-agent

- name: Install agent client key
  ansible.builtin.copy:
    src: "{{ basis_pki_dir }}/agent-{{ inventory_hostname }}.key"
    dest: "{{ basis_tls_dir }}/agent.key"
    owner: root
    group: root
    mode: "0600"
  notify: reload basis-agent

- name: Write Host config
  ansible.builtin.template:
    src: host.yaml.j2
    dest: "{{ basis_config_dir }}/host.yaml"
    owner: root
    group: root
    # 0600 because registry credentials (if configured) live here in
    # plaintext. The agent runs as root, no other reader should see this.
    mode: "0600"
  # host.yaml changes always trigger a full restart — `reload` (SIGHUP)
  # only picks up the small set of mutable fields (controllerEndpoint),
  # and quietly logs a warning for everything else. New fields landing
  # on existing hosts (e.g. the dual-VG `storage` block added with the
  # Rook handoff) are immutable and were silently ignored under reload
  # until the next manual restart. Restart is cheap — VMs run in
  # independent systemd scopes and survive across agent bounces.
  notify: restart basis-agent

- name: Install systemd unit
  # Templated so the unit picks up `basis_agent_rust_log`.
  ansible.builtin.template:
    src: basis-agent.service.j2
    dest: /etc/systemd/system/basis-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon reload
    - restart basis-agent

- name: Enable and start basis-agent
  ansible.builtin.systemd:
    name: basis-agent
    enabled: true
    state: started
    daemon_reload: true
