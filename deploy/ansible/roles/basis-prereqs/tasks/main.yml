---
# On Proxmox hosts, `pve-qemu-kvm` provides qemu-img and an apt-hook
# refuses to let us install `qemu-utils` because it would remove the
# Proxmox meta-package. Only install qemu-utils if qemu-img isn't
# already on PATH from some other source.
- name: Check whether qemu-img is already available
  ansible.builtin.command: which qemu-img
  register: qemu_img_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Install qemu-utils (unless qemu-img is already provided)
  ansible.builtin.package:
    name: qemu-utils
    state: present
  when: qemu_img_check.rc != 0

- name: Install other host packages
  ansible.builtin.package:
    name:
      - genisoimage         # cidata ISO generation
      - iproute2            # ip(8) for bridge/tap management
      - curl                # cloud-hypervisor HTTP API
      - lvm2                # VM-disk thin pool management
    state: present

# --- LVM thin pool for VM disks -----------------------------------------
# Every VM's rootfs is a thin snapshot of a golden image LV, attached
# raw to cloud-hypervisor with direct=on. No host FS journal or qcow2
# metadata on the fsync path.

- name: Require basis_lvm_devices to be set
  ansible.builtin.assert:
    that:
      - basis_lvm_devices | length > 0
    fail_msg: >-
      basis_lvm_devices must be set to one or more dedicated block
      devices (e.g. [/dev/sdb, /dev/sdc]). Every basis VM gets a thin
      snapshot LV from this pool. Each device must be completely
      unused — wipe existing filesystems or zpools first with
      `wipefs -a`. See group_vars/all.yml for details.

- name: Enable issue_discards in /etc/lvm/lvm.conf
  # Required for end-to-end TRIM: guest discard → LV → PV → SSD. Without
  # this, freed thin-pool extents are never TRIMmed and the SSD degrades
  # badly under container image churn.
  ansible.builtin.lineinfile:
    path: /etc/lvm/lvm.conf
    regexp: '^\s*#?\s*issue_discards\s*='
    line: '    issue_discards = 1'
    backrefs: false

- name: Check whether the basis volume group already exists
  ansible.builtin.command: "vgs --noheadings --options vg_name {{ basis_lvm_vg }}"
  register: basis_vg_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Create volume group {{ basis_lvm_vg }} spanning {{ basis_lvm_devices | join(', ') }}
  # Idempotent: if the VG already exists, this is a no-op. First run does
  # pvcreate + vgcreate across every listed device. Will refuse if any
  # device has an unrecognized filesystem — operator must `wipefs -a`
  # each device first (intentional guardrail, not a bug).
  community.general.lvg:
    vg: "{{ basis_lvm_vg }}"
    pvs: "{{ basis_lvm_devices | join(',') }}"
    state: present

- name: Check whether the basis thin pool already exists
  ansible.builtin.command: >-
    lvs --noheadings --options lv_name {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
  register: basis_pool_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Create thin pool {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
  # --extents 95%FREE leaves 5% in the VG for metadata growth and any
  # future non-pool allocations. --poolmetadatasize 1G is the upper
  # recommended size; sizing this too small causes silent pool corruption
  # when metadata fills.
  ansible.builtin.command: >-
    lvcreate
    --thinpool {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
    --extents 95%FREE
    --chunksize {{ basis_lvm_chunk_size }}
    --poolmetadatasize 1G
    --zero {{ 'y' if basis_lvm_zero_allocation else 'n' }}
  when: basis_pool_check.rc != 0
  changed_when: true
# ------------------------------------------------------------------------

- name: Check installed cloud-hypervisor version
  ansible.builtin.command: "{{ basis_bin_dir }}/cloud-hypervisor --version"
  register: ch_version_check
  failed_when: false
  changed_when: false
  check_mode: false

- name: Download cloud-hypervisor static binary
  ansible.builtin.get_url:
    url: "{{ cloud_hypervisor_url }}"
    dest: "{{ basis_bin_dir }}/cloud-hypervisor"
    mode: "0755"
    owner: root
    group: root
    # `force: true` is required: without it, get_url skips the download
    # whenever `dest` already exists, so version bumps silently no-op.
    # `when` still gates it, so we only pay the download cost on upgrade.
    force: true
  # `cloud-hypervisor --version` prints `cloud-hypervisor v<N>.<N>.<N>`.
  when: ch_version_check.rc != 0 or cloud_hypervisor_version not in (ch_version_check.stdout | default(''))

- name: Verify /dev/kvm exists (virtualization enabled in BIOS)
  ansible.builtin.stat:
    path: /dev/kvm
  register: kvm_device
  failed_when: not kvm_device.stat.exists

- name: Load kernel modules at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/basis.conf
    content: |
      kvm
      vfio-pci
    owner: root
    group: root
    mode: "0644"

- name: Load kernel modules now (best-effort; some are auto-loaded)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - kvm
    - vfio-pci
  failed_when: false

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ basis_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ basis_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure TLS directory exists
  ansible.builtin.file:
    path: "{{ basis_tls_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
