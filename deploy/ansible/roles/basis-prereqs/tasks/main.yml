---
# --- Physical NIC detection + bridge networking -------------------------
# On a fresh Ubuntu/Debian install the host IP sits directly on the
# physical NIC. If basis-agent later enslaves that NIC to vmbr0, the
# kernel strips the IP and the host is unreachable. We fix that here,
# before anything else: render a netplan config that puts the IP on the
# bridge with the NIC as a member, then reboot to apply it cleanly.
#
# Ex-Proxmox hosts (where vmbr0 already owns the IP) skip the reboot —
# detection finds the existing bridge slave and the rendered config
# matches reality, so nothing changes.

- name: Detect physical NIC
  # If {{ basis_bridge }} already exists, pick its first non-tap slave —
  # this is the correct answer both before the first apply (bridge
  # absent, fall through to default-route interface) and after it
  # (bridge owns the IP, so ansible_facts.default_ipv4.interface would
  # otherwise resolve to the bridge itself).
  ansible.builtin.shell: |
    set -o pipefail
    slave=$(ip -o link show master {{ basis_bridge }} 2>/dev/null \
      | awk '{print $2}' \
      | sed 's/[:@].*//' \
      | grep -v '^bas' \
      | head -1 || true)
    if [ -n "$slave" ]; then
      echo "$slave"
    else
      echo "{{ ansible_facts.default_ipv4.interface | default('') }}"
    fi
  register: _basis_nic_detect
  changed_when: false
  check_mode: false
  when: basis_physical_nic | length == 0

- name: Record detected physical NIC
  ansible.builtin.set_fact:
    basis_physical_nic: "{{ _basis_nic_detect.stdout | trim }}"
  when:
    - basis_physical_nic | length == 0
    - _basis_nic_detect.stdout is defined

- name: Require basis_physical_nic to resolve
  # Empty means detection found nothing — surface it now instead of
  # rendering an invalid netplan or host.yaml.
  ansible.builtin.assert:
    that:
      - basis_physical_nic | length > 0
    fail_msg: >-
      basis_physical_nic could not be autodetected. The bridge
      ({{ basis_bridge }}) has no non-tap slaves and there is no
      default-route interface. Set basis_physical_nic explicitly in
      host_vars/{{ inventory_hostname }}.yml or inventory.

- name: Check whether the host IP is already on the bridge
  # On ex-Proxmox hosts (or any host where netplan already routes via
  # the bridge), `ansible_facts.default_ipv4.interface` resolves to the
  # bridge. That's the target state — no netplan work to do.
  ansible.builtin.set_fact:
    _basis_ip_already_on_bridge: "{{ ansible_facts.default_ipv4.interface | default('') == basis_bridge }}"

- name: Render netplan bridge config
  # Captures the host's current IPv4 identity onto the bridge, with the
  # physical NIC as a member. Only runs when the IP isn't already on the
  # bridge — we must not clobber a working Proxmox-style setup.
  ansible.builtin.template:
    src: 60-basis-bridge.yaml.j2
    dest: /etc/netplan/60-basis-bridge.yaml
    owner: root
    group: root
    mode: "0600"
  register: _basis_netplan_render
  when:
    - basis_manage_netplan | bool
    - not _basis_ip_already_on_bridge

- name: Reboot to apply bridge config
  # Safer than `netplan apply` on a live SSH session: the IP transition
  # is atomic across the reboot, and ansible's reboot module handles
  # the disconnect/reconnect wait properly. Only runs on first apply —
  # idempotent renders don't trigger a reboot on subsequent runs.
  ansible.builtin.reboot:
    reboot_timeout: 600
  register: _basis_rebooted
  when:
    - basis_manage_netplan | bool
    - _basis_netplan_render is defined
    - _basis_netplan_render.changed

- name: Re-gather facts after reboot
  # Reboot doesn't auto-refresh facts; gather again so ansible_facts.default_ipv4
  # reflects the bridge-owned IP rather than the pre-reboot state.
  ansible.builtin.setup:
  when: _basis_rebooted is defined and _basis_rebooted is changed

# Static host-kernel prerequisites for basis. All sysctls basis depends
# on live in one drop-in so operators have a single file to diff. Loaded
# by systemd-sysctl.service before multi-user.target, so basis-agent
# always sees them set at startup. Drift at runtime surfaces as a real
# outage that the operator investigates, which is the desired signal.
#
# * ip_forward: cluster traffic crosses bridges + the uplink; the host
#   acts as a router for cluster CIDRs.
# * tcp/udp_l3mdev_accept: basis-agent enslaves each cluster bridge
#   (brc<vni>) to a per-trust-domain VRF (bvrf-*). With the default 0,
#   sockets in the default VRF can't match traffic arriving on a
#   VRF-bound interface, so the host kernel RSTs its own outgoing TCP
#   to cluster CIDRs (e.g. `ssh root@10.100.x.y` from the hypervisor:
#   SYN out, SYN-ACK back, RST). ICMP is unaffected, which makes this
#   look like a TCP-only failure.
# * proxy_arp on the uplink: LAN-scoped cluster_vips (apiserver public
#   VIP, LB Service block) are installed as `ip neigh ... proxy` entries
#   on the uplink by basis-agent, but those entries only fire when
#   proxy_arp is enabled on the interface. Without it, LAN clients ARP
#   for the VIP and get no response — connectivity to the VIP fails the
#   moment a remote ARP cache rolls.
# * accept_local on the uplink: cross-cluster traffic (workload VM →
#   mgmt cluster's LB IP) is MASQUERADE'd to the host's LAN IP at
#   egress, the LAN gateway hairpins it back to the host because the
#   host proxy-ARPs the VIP, and the returning packet has the host's
#   own LAN IP as source. With accept_local=0 (default) the kernel
#   drops it as martian; with accept_local=1 the kernel accepts it
#   and forwards via the BGP-learned next-hop into the destination
#   cluster's overlay.
- name: Write basis sysctl drop-in
  ansible.builtin.copy:
    dest: /etc/sysctl.d/60-basis.conf
    content: |
      # Managed by basis-prereqs. See deploy/ansible/roles/basis-prereqs/tasks/main.yml.
      net.ipv4.ip_forward = 1
      net.ipv4.tcp_l3mdev_accept = 1
      net.ipv4.udp_l3mdev_accept = 1
      net.ipv4.conf.{{ basis_bridge }}.proxy_arp = 1
      # Tree-VRF lookups fall through to main on miss — basis-agent
      # keeps each VRF's table to its own connected routes plus
      # learned /32s, and main holds the LAN default and cross-cluster
      # routes. strict_mode=1 would break that fall-through.
      net.vrf.strict_mode = 0
    owner: root
    group: root
    mode: "0644"
  register: _basis_sysctl

- name: Apply basis sysctls now
  ansible.builtin.command: sysctl -p /etc/sysctl.d/60-basis.conf
  when: _basis_sysctl.changed
  changed_when: true
# ------------------------------------------------------------------------

# On Proxmox hosts, `pve-qemu-kvm` provides qemu-img and an apt-hook
# refuses to let us install `qemu-utils` because it would remove the
# Proxmox meta-package. Only install qemu-utils if qemu-img isn't
# already on PATH from some other source.
- name: Check whether qemu-img is already available
  ansible.builtin.command: which qemu-img
  register: qemu_img_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Refresh apt cache if stale
  # Without this, freshly imaged hosts can fail to find packages whose
  # apt index entries postdate the image. cache_valid_time bounds
  # re-runs to once an hour so back-to-back applies don't re-fetch.
  # `failed_when: false` because PVE hosts ship with the proxmox
  # enterprise repos enabled but no subscription — those return 401
  # even when the debian repos refresh fine. The next `package` task
  # below fails loudly if anything we actually need is missing.
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_facts['pkg_mgr'] == 'apt'
  failed_when: false

- name: Install qemu-utils (unless qemu-img is already provided)
  ansible.builtin.package:
    name: qemu-utils
    state: present
  when: qemu_img_check.rc != 0

- name: Install other host packages
  ansible.builtin.package:
    name:
      - genisoimage         # cidata ISO generation
      - iproute2            # ip(8) for bridge/tap management
      - curl                # cloud-hypervisor HTTP API
      - lvm2                # VM-disk thin pool management
      - sshpass             # smoke-test SSHes into guests with a baked-in cloud-init password
    state: present

# --- LVM thin pool for VM disks -----------------------------------------
# Every VM's rootfs is a thin snapshot of a golden image LV, attached
# raw to cloud-hypervisor with direct=on. No host FS journal or qcow2
# metadata on the fsync path.

- name: Require basis_lvm_devices to be set
  ansible.builtin.assert:
    that:
      - basis_lvm_devices | length > 0
    fail_msg: >-
      basis_lvm_devices must be set to one or more dedicated block
      devices (e.g. [/dev/sdb, /dev/sdc]). Every basis VM gets a thin
      snapshot LV from this pool. Each device must be completely
      unused — wipe existing filesystems or zpools first with
      `wipefs -a`. See group_vars/all.yml for details.

- name: Enable issue_discards in /etc/lvm/lvm.conf
  # Required for end-to-end TRIM: guest discard → LV → PV → SSD. Without
  # this, freed thin-pool extents are never TRIMmed and the SSD degrades
  # badly under container image churn.
  ansible.builtin.lineinfile:
    path: /etc/lvm/lvm.conf
    regexp: '^\s*#?\s*issue_discards\s*='
    line: '    issue_discards = 1'
    backrefs: false

- name: Check whether the basis volume group already exists
  ansible.builtin.command: "vgs --noheadings --options vg_name {{ basis_lvm_vg }}"
  register: basis_vg_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Create volume group {{ basis_lvm_vg }} spanning {{ basis_lvm_devices | join(', ') }}
  # Idempotent: if the VG already exists, this is a no-op. First run does
  # pvcreate + vgcreate across every listed device. Will refuse if any
  # device has an unrecognized filesystem — operator must `wipefs -a`
  # each device first (intentional guardrail, not a bug).
  community.general.lvg:
    vg: "{{ basis_lvm_vg }}"
    pvs: "{{ basis_lvm_devices | join(',') }}"
    state: present

- name: Check whether the basis thin pool already exists
  ansible.builtin.command: >-
    lvs --noheadings --options lv_name {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
  register: basis_pool_check
  changed_when: false
  failed_when: false
  check_mode: false

- name: Create thin pool {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
  # --extents 95%FREE leaves 5% in the VG for metadata growth and any
  # future non-pool allocations. --poolmetadatasize 1G is the upper
  # recommended size; sizing this too small causes silent pool corruption
  # when metadata fills.
  ansible.builtin.command: >-
    lvcreate
    --thinpool {{ basis_lvm_vg }}/{{ basis_lvm_thinpool }}
    --extents 95%FREE
    --chunksize {{ basis_lvm_chunk_size }}
    --poolmetadatasize 1G
    --zero {{ 'y' if basis_lvm_zero_allocation else 'n' }}
  when: basis_pool_check.rc != 0
  changed_when: true
# ------------------------------------------------------------------------

# Per-pool data VGs: one VG per device per pool (operator declares
# `basis_storage_pools[].devices[]`). The agent enforces "one VG per
# device" at startup; basis-prereqs makes that physically true by
# pvcreating + vgcreating each device into its own VG named in the
# pool config. Loopback-backed devices are supported for E2E (declare
# `loopback: { file, size }` instead of resolving from `id`).

- name: storage — flatten devices across all pools for batched provisioning
  ansible.builtin.set_fact:
    basis_pool_devices: >-
      {{ basis_storage_pools
         | map(attribute='devices')
         | sum(start=[]) }}

- name: storage — derive loopback-backed devices
  ansible.builtin.set_fact:
    basis_loopback_devices: >-
      {{ basis_pool_devices | selectattr('loopback', 'defined') | list }}

- name: storage — ensure loopback backing files exist
  ansible.builtin.command:
    cmd: "truncate -s {{ item.loopback.size }} {{ item.loopback.file }}"
    creates: "{{ item.loopback.file }}"
  loop: "{{ basis_loopback_devices }}"
  loop_control:
    label: "{{ item.loopback.file }}"

# Single systemd unit that binds every loopback file at boot. Re-
# rendered when the file list changes; absent unit removed when the
# host transitions back to pure-block-device inventory.
- name: storage — install loopback systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/basis-storage-loopback.service
    mode: "0644"
    content: |
      [Unit]
      Description=Bind basis storage-pool loopback devices
      DefaultDependencies=no
      After=local-fs.target
      Before=lvm2-monitor.service
      [Service]
      Type=oneshot
      RemainAfterExit=yes
      {% for d in basis_loopback_devices %}
      ExecStart=/bin/sh -c '/sbin/losetup -j {{ d.loopback.file }} -O NAME --noheadings | grep -q . || /sbin/losetup --find {{ d.loopback.file }}'
      ExecStop=/bin/sh -c 'dev=$(/sbin/losetup -j {{ d.loopback.file }} -O NAME --noheadings | head -1); [ -n "$dev" ] && /sbin/losetup --detach "$dev" || true'
      {% endfor %}
      [Install]
      WantedBy=local-fs.target
  when: basis_loopback_devices | length > 0
  register: storage_loopback_unit

- name: storage — daemon-reload after unit change
  ansible.builtin.systemd:
    daemon_reload: true
  when: storage_loopback_unit.changed | default(false)

- name: storage — enable + start loopback unit
  ansible.builtin.systemd:
    name: basis-storage-loopback.service
    enabled: true
    state: started
  when: basis_loopback_devices | length > 0

- name: storage — stop + disable loopback unit when no loopback devices
  ansible.builtin.systemd:
    name: basis-storage-loopback.service
    enabled: false
    state: stopped
  failed_when: false
  when: basis_loopback_devices | length == 0

- name: storage — remove stale loopback unit + reload
  ansible.builtin.file:
    path: /etc/systemd/system/basis-storage-loopback.service
    state: absent
  register: storage_loopback_unit_removed
  when: basis_loopback_devices | length == 0

- name: storage — daemon-reload after unit removal
  ansible.builtin.systemd:
    daemon_reload: true
  when: storage_loopback_unit_removed.changed | default(false)

# Resolve each device to the actual block-device path pvcreate will
# consume: a real `device:` path for block devices, or the bound
# loop device for loopback-backed entries. The agent reads `id` from
# host.yaml to find the by-id symlink; provisioning happens on the
# resolved device path.
- name: storage — resolve every device to a block-device path
  ansible.builtin.shell: |
    set -euo pipefail
    {% for d in basis_pool_devices %}
    {% if d.loopback is defined %}
    losetup -j {{ d.loopback.file }} -O NAME --noheadings | head -1 | awk '{$1=$1};1'
    {% else %}
    echo {{ d.device | default('/dev/disk/by-id/' ~ d.id) }}
    {% endif %}
    {% endfor %}
  register: basis_pool_resolved
  changed_when: false

- name: storage — fail if any device resolved to empty (loop not bound)
  ansible.builtin.assert:
    that:
      - basis_pool_resolved.stdout_lines | length == basis_pool_devices | length
      - basis_pool_resolved.stdout_lines | reject('match', '^\\s*$') | list | length
        == basis_pool_devices | length
    fail_msg: >-
      One or more storage devices did not resolve to a block device.
      For loopback-backed entries this means the systemd unit did not
      bind the file. Check `journalctl -u basis-storage-loopback.service`.

- name: storage — pvcreate + vgcreate one VG per device
  community.general.lvg:
    vg: "{{ item.0.vg }}"
    pvs: "{{ item.1 }}"
    state: present
  loop: "{{ basis_pool_devices | zip(basis_pool_resolved.stdout_lines) | list }}"
  loop_control:
    label: "{{ item.0.id }} → {{ item.0.vg }}"
# ------------------------------------------------------------------------

- name: Check installed cloud-hypervisor version
  ansible.builtin.command: "{{ basis_bin_dir }}/cloud-hypervisor --version"
  register: ch_version_check
  failed_when: false
  changed_when: false
  check_mode: false

- name: Download cloud-hypervisor static binary
  ansible.builtin.get_url:
    url: "{{ cloud_hypervisor_url }}"
    dest: "{{ basis_bin_dir }}/cloud-hypervisor"
    mode: "0755"
    owner: root
    group: root
    # `force: true` is required: without it, get_url skips the download
    # whenever `dest` already exists, so version bumps silently no-op.
    # `when` still gates it, so we only pay the download cost on upgrade.
    force: true
  # `cloud-hypervisor --version` prints `cloud-hypervisor v<N>.<N>.<N>`.
  when: ch_version_check.rc != 0 or cloud_hypervisor_version not in (ch_version_check.stdout | default(''))

- name: Verify /dev/kvm exists (virtualization enabled in BIOS)
  ansible.builtin.stat:
    path: /dev/kvm
  register: kvm_device
  failed_when: not kvm_device.stat.exists

- name: Load kernel modules at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/basis.conf
    content: |
      kvm
      vfio-pci
    owner: root
    group: root
    mode: "0644"

- name: Load kernel modules now (best-effort; some are auto-loaded)
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - kvm
    - vfio-pci
  failed_when: false

# Directory creation lives in the controller/agent roles directly so the
# controller host (which skips this prereqs role) still gets its layout.
