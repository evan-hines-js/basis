---
# Issue a single leaf certificate signed by our CA.
# Caller sets: leaf_name, leaf_cn, leaf_sans.

- name: "[{{ leaf_name }}] Generate private key"
  community.crypto.openssl_privatekey:
    path: "{{ basis_pki_dir }}/{{ leaf_name }}.key"
    size: 4096
    mode: "0600"

- name: "[{{ leaf_name }}] Generate CSR"
  community.crypto.openssl_csr:
    path: "{{ basis_pki_dir }}/{{ leaf_name }}.csr"
    privatekey_path: "{{ basis_pki_dir }}/{{ leaf_name }}.key"
    common_name: "{{ leaf_cn }}"
    subject_alt_name: "{{ leaf_sans }}"
    mode: "0600"

- name: "[{{ leaf_name }}] Sign leaf cert with CA"
  community.crypto.x509_certificate:
    path: "{{ basis_pki_dir }}/{{ leaf_name }}.crt"
    csr_path: "{{ basis_pki_dir }}/{{ leaf_name }}.csr"
    ownca_path: "{{ basis_pki_dir }}/ca.crt"
    ownca_privatekey_path: "{{ basis_pki_dir }}/ca.key"
    provider: ownca
    ownca_not_after: "+{{ basis_leaf_validity_days }}d"
    ownca_digest: sha256
    mode: "0644"
    force: false
