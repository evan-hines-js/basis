---
# gobgpd (the BGP daemon basis uses for cell route reflection +
# per-host speakers). Runs as its own systemd service on every basis
# host so its lifecycle is independent of basis-controller /
# basis-agent — a basis bounce doesn't drop BGP sessions or flap
# VIPs. We pull a prebuilt release tarball from upstream rather than
# building from source: gobgp ships statically-linked Go binaries
# with no glibc dependencies, so cross-distro portability is free.
gobgp_version: v4.4.0
gobgp_grpc_host: 127.0.0.1
gobgp_grpc_port: 50051

# Paths on managed hosts.
basis_bin_dir: /usr/local/bin
basis_config_dir: /etc/basis
basis_tls_dir: "{{ basis_config_dir }}/tls"
# Small persistent state: agent SQLite DB, cached OCI image artifacts,
# cloud-init ISOs, systemd unit files. NOT the VM disk hot path — that
# goes on the LVM thin pool below. Can sit on the OS disk.
basis_data_dir: /var/lib/basis

# Dedicated block devices for the VM-disk LVM thin pool. Every VM gets a
# thin snapshot LV from this pool attached raw to cloud-hypervisor with
# O_DIRECT — no host filesystem journal, no qcow2 metadata in the write
# path. This is the hot path for guest etcd fsync, container image
# extracts, and kubelet state writes.
#
# MUST be enterprise SSDs with power-loss protection. Consumer SSDs
# turn etcd into a lease-expiry storm under image-pull load.
#
# Multiple devices become PVs in the same VG. The thin pool is allocated
# linearly (not striped): most per-VM LVs land on a single PV, so tail
# fsync latency is bounded by the slowest drive in the write path —
# single-drive, not multi-drive-max, which is what etcd fsync wants.
# Capacity sums across devices.
#
# First apply: pvcreate + vgcreate on each device. Subsequent applies
# are idempotent (skip if VG exists). Each device must be completely
# unused — wipe any existing filesystem/pool first:
#
#   zpool destroy ent-zfspool    # if repurposing from ZFS
#   wipefs -a /dev/sdb /dev/sdc /dev/sdd /dev/sde
#
# Point at disks you don't mind destroying.
basis_lvm_devices: []  # REQUIRED, e.g. [/dev/sdb, /dev/sdc, /dev/sdd, /dev/sde]
basis_lvm_vg: basis
basis_lvm_thinpool: pool
# 256 KiB is a middle ground: 64K (default) thrashes metadata on large
# container image extracts; 1 MiB amplifies writes for etcd's 4K fsyncs.
# 256K handles both acceptably. Don't change without measuring.
basis_lvm_chunk_size: 256K
# Skip zeroing on block allocation — the chunk gets overwritten by image
# data on first write anyway, so zeroing just doubles the first-write
# cost. Safe for single-tenant k8s VMs; unsafe in multi-tenant settings
# where previously-freed data must not leak across VMs.
basis_lvm_zero_allocation: false

# Block devices (or file-backed loopbacks) that compose the basis-data
# VG — the plain VG that holds VM extra-disk LVs (raw block exposed to
# the guest for in-cluster CSI drivers: Rook OSDs, Longhorn replicas,
# Mayastor pools, OpenEBS LocalPV, …). Kept distinct from the rootfs
# thin pool because bluestore-style consumers on dm-thin double-book
# allocation, fragment I/O, break TRIM passthrough, and share a blast
# radius with VM rootfs. See crates/basis-agent/src/lvm.rs and
# docs/storage-pools.md.
#
# Each entry is either:
#   * a string path to a real block device (production):
#       /dev/nvme1n1
#   * a {file, size} dict — basis-prereqs truncates the file, binds it
#     via losetup, and installs a systemd unit that re-binds on reboot:
#       { file: /var/lib/basis/basis-data.img, size: 200G }
#
# Production inventories list dedicated NVMes / partitions. E2E /
# CI inventories on shared hardware list a file-backed loopback so the
# dual-pool architecture is honored without dedicating physical disks.
# Mixing forms in one list is allowed but unusual.
#
# Empty list fails the role at apply time. The agent refuses to start
# without basis-data and that's intentional — there is no silent
# fallback to the rootfs pool.
basis_lvm_data_devices: []  # REQUIRED, see comment above
basis_lvm_data_vg: basis-data

# Controller bind + well-known server SAN. `basis_controller_san` must
# match the SAN we put on the controller's server cert AND the value the
# agent clients set as their TLS domain name.
basis_controller_port: 7443
basis_controller_san: basis-controller

# Plain-HTTP Prometheus metrics endpoint on the controller. Scraped by
# Prometheus at /metrics; no TLS, no auth — bind to a network that only
# your Prometheus can reach.
basis_controller_metrics_port: 9443

# How much the scheduler is allowed to overcommit CPU on each host: the
# sum of assigned vCPU may exceed the host's logical CPUs by this factor.
# Memory and disk are always strict. 1.0 disables overcommit; 4.0 is
# typical for k8s workload VMs where most containers are idle most of
# the time. Must be >= 1.0.
basis_cpu_overcommit_ratio: 4.0

# Cell BGP route reflector. Every basis host runs `gobgpd` (installed
# by the basis-gobgpd role); the controller drives its local gobgpd as
# the cell route reflector, and every agent's local gobgpd peers to it
# at this ASN. routerId is the controller's underlay LAN IP — the
# address every agent connects to via BGP. Default is the first
# basis_controller host's ansible_host.
basis_bgp_asn: 64512
basis_bgp_router_id: "{{ hostvars[groups['basis_controller'][0]]['ansible_host'] }}"

# Bidirectional inventory reconciliation on agent register.
# Compares the agent's reported `current_inventory` against the
# controller's DB and acts on the discrepancies.
#
#   false (default, prod-safe):
#     The controller logs every discrepancy loudly but changes
#     nothing. Agent kernel state, VMs, and DB rows all stay put.
#     Use this in production: a DB loss should NEVER cause an
#     automatic teardown of running workloads.
#
#   true (dev / test):
#     The controller automatically reconciles in BOTH directions —
#     synthesises one-shot tombstones for kernel state the DB
#     doesn't track AND rolls DB rows the agent doesn't have into
#     the standard teardown pipeline. Useful for CI / dev loops
#     where wiping controller.db and letting the cell reset is the
#     workflow.
#
# Flip per-environment in host/group vars only after you've decided
# the wipe is intentional.
basis_auto_reconcile_orphan_inventory: true

# Where the playbook finds binaries on the control node. Build with
# `cargo build --release` before running.
basis_repo_root: "{{ playbook_dir }}/../.."
basis_binary_dir: "{{ basis_repo_root }}/target/release"

# Local (control-node) PKI state. Certs/keys never leave the control node
# except to be copied to their specific host.
basis_pki_dir: "{{ playbook_dir }}/pki"
basis_ca_validity_days: 3650
basis_leaf_validity_days: 365

# Cluster networking. Every cluster's VMs live on a per-cluster VXLAN
# that carves its own CIDR out of `cluster_supernet` — an overlay
# space that does NOT need to match the physical LAN (the VXLAN outer
# IP is the host's uplink address, the inner is cluster-space).
#
# Pools are named address ranges a cluster's `externalIpPool` selects
# at create time. Each pool has a `scope` that decides the dataplane
# treatment of allocated VIPs:
#
#   * scope: lan (default) — LAN-routable. The agent advertises the
#     pool's prefixes via BGP, proxy-ARPs them onto the uplink, and
#     installs the bridge route. Reachable from the LAN.
#     Required for any cluster with `apiserverVisibility: Public`,
#     because a public apiserver VIP only makes sense if the LAN can
#     reach it.
#
#   * scope: tree — cell-internal. The agent installs the bridge
#     route on every host (every host eagerly bootstraps an empty
#     `brc<vni>` for every tree-scoped cluster) but does NOT proxy-ARP
#     and does NOT advertise via BGP. The LAN cannot reach these
#     VIPs; cross-cluster reachability inside the cell flows over
#     each host's per-cluster bridge. Carve from RFC1918 space outside
#     the LAN broadcast domain so the LAN never tries to ARP for it.
#
# Pool CIDRs must be pairwise disjoint and disjoint from
# `cluster_supernet`. The two-pool model assumes:
#   * cell-public   — LAN-routable. Hosts the root/management cluster
#     apiserver VIP and any cluster opting into `Public` visibility.
#   * cell-internal — tree-scoped. Hosts workload clusters' LB blocks
#     (and `Private` apiservers automatically, which sit inside the
#     cluster CIDR rather than this pool, but the pool still hosts
#     LB Service blocks for those clusters). Never reaches the LAN.
#
# `default_external_service_ips` is the cell-wide default block size
# for Cilium LoadBalancer Services. Must be a power of two. Override
# per-cluster only when a specific cluster needs a different count.
#
# Override these per environment in host/group vars to match your
# actual LAN segmentation.
basis_network:
  cluster_supernet: 10.100.0.0/16
  default_external_service_ips: 16
  # Each pool is an address slice basis owns, expressed as a single
  # CIDR. The allocator walks the host range (skip network +
  # broadcast) and picks an aligned /N out of it for service blocks.
  # For a shared LAN subnet where basis only owns part of it, carve a
  # smaller CIDR matching that slice — the cidr IS the exclusion
  # mechanism, so picking `.192/27` excludes the LAN gateway at `.1`.
  # Non-power-of-two ranges become multiple pool entries.
  pools:
    # LAN-routable pool. /26 → 64 addrs, 62 allocatable. Sized for
    # the cell-wide default_external_service_ips=16: a /27 has only
    # 30 allocatable addresses with no aligned /28 inside (the only
    # candidates clip the parent /27's network or broadcast), so the
    # allocator can't place a Service block there. /26 leaves room
    # for one apiserver VIP plus a /28 Service block per cluster,
    # plus headroom.
    - name: cell-public
      cidr: 10.0.0.192/26
    # Cell-internal pool. RFC1918 carve well outside the LAN's
    # broadcast domain. /24 = 254 allocatable, room for many workload
    # clusters' LB blocks. The agent installs bridge routes on every
    # host (eager bootstrap of `brc<vni>` for every tree-scoped
    # cluster) but never proxy-ARPs onto the uplink and never
    # advertises via BGP — the LAN cannot reach this range.
    - name: cell-internal
      cidr: 172.20.0.0/24
      scope: tree

# Credentials for private OCI registries basis-agent pulls VM images
# from. Override in host/group vars or vault when deploying against
# private registries. Example:
#   basis_agent_registries:
#     - host: ghcr.io
#       username: "{{ ghcr_user }}"
#       password: "{{ ghcr_token }}"   # source from ansible-vault
basis_agent_registries: []

# Operator-assigned placement preference, lower is preferred. The
# scheduler uses this as a tiebreaker after capacity + GPU topology +
# anti-affinity. Default 0 means "no preference"; bump deprioritized
# hosts (e.g. consumer-disk boxes that shouldn't carry etcd) to a
# higher number. Per-host override only — there's no useful cell-wide
# value other than 0.
basis_host_rank: 0

# Operator-assigned labels (e.g. {tier: fast, gpu: h100}). Used by
# Machine specs that declare `placement.requires` (hard filter) or
# `placement.prefers` (soft tiebreak). Default empty — a host with no
# labels satisfies only an empty `requires`. Per-host override.
basis_host_labels: {}

# Per-host bridge name. Set to `vmbr0` when colocating Basis on hosts
# that already run Proxmox — the agent skips bridge creation if one
# by this name already exists, and Basis's VMs end up on the same L2
# segment as Proxmox's VMs.
basis_bridge: vmbr0

# NIC the agent attaches to its bridge. Autodetected per host by
# basis-prereqs: picks the bridge's non-tap slave if the bridge already
# exists, otherwise the default-route interface. This keeps detection
# correct *after* the first netplan apply has moved the host IP onto
# the bridge (when ansible_facts.default_ipv4.interface would otherwise
# resolve to the bridge itself). Override in host_vars or inventory for
# nodes with multiple NICs or a non-default routing setup.
basis_physical_nic: ""

# Whether basis-prereqs manages /etc/netplan/60-basis-bridge.yaml to put
# the host IP on {{ basis_bridge }} with the physical NIC as a member.
# Required on any host where the physical NIC currently owns the IP —
# otherwise basis-agent's `ip link set <nic> master <bridge>` strips the
# IP and locks you out. Set to false if you manage bridge networking
# yourself (e.g., already running on Proxmox where vmbr0 is preconfigured).
basis_manage_netplan: true

# Cloud Hypervisor release to install. A static x86_64 binary from the
# official GitHub release.
cloud_hypervisor_version: "51.1"
cloud_hypervisor_url: "https://github.com/cloud-hypervisor/cloud-hypervisor/releases/download/v{{ cloud_hypervisor_version }}/cloud-hypervisor-static"

# Note: we do NOT install rust-hypervisor-firmware. basis-agent boots
# guests directly with `cloud-hypervisor --kernel --initramfs` using the
# kernel+initrd shipped as OCI layers alongside each node image. The
# firmware blob would only be needed if we switched to EFI boot.

# RUST_LOG injected into the basis-agent and basis-controller systemd
# units. INFO baseline plus TRACE on the modules whose events make up
# the debug bundle:
#
#   * `basis_agent::vm` — cloud-hypervisor invocation (NIC `--net`,
#     each `--disk`, vfio bindings) at VM spawn.
#   * `basis_agent::network::cluster` — per-cluster reconcile
#     decision, prefix-route add/del, proxy-ARP add/del, GARP burst.
#   * `basis_controller::server` — per-cluster classification (owner,
#     carriers, visibility, pool) on each reconcile build.
#   * `basis_controller::db` — LAN-VIP owner re-elections (prev → new,
#     carrier set at the change).
basis_agent_rust_log: "info,basis_agent::vm=trace,basis_agent::network::cluster=trace"
basis_controller_rust_log: "info,basis_controller::server=trace,basis_controller::db=trace"
