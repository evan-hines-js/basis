---
# Paths on managed hosts.
basis_bin_dir: /usr/local/bin
basis_config_dir: /etc/basis
basis_tls_dir: "{{ basis_config_dir }}/tls"
# Small persistent state: agent SQLite DB, cached OCI image artifacts,
# cloud-init ISOs, systemd unit files. NOT the VM disk hot path — that
# goes on the LVM thin pool below. Can sit on the OS disk.
basis_data_dir: /var/lib/basis

# Dedicated block devices for the VM-disk LVM thin pool. Every VM gets a
# thin snapshot LV from this pool attached raw to cloud-hypervisor with
# O_DIRECT — no host filesystem journal, no qcow2 metadata in the write
# path. This is the hot path for guest etcd fsync, container image
# extracts, and kubelet state writes.
#
# MUST be enterprise SSDs with power-loss protection. Consumer SSDs
# turn etcd into a lease-expiry storm under image-pull load.
#
# Multiple devices become PVs in the same VG. The thin pool is allocated
# linearly (not striped): most per-VM LVs land on a single PV, so tail
# fsync latency is bounded by the slowest drive in the write path —
# single-drive, not multi-drive-max, which is what etcd fsync wants.
# Capacity sums across devices.
#
# First apply: pvcreate + vgcreate on each device. Subsequent applies
# are idempotent (skip if VG exists). Each device must be completely
# unused — wipe any existing filesystem/pool first:
#
#   zpool destroy ent-zfspool    # if repurposing from ZFS
#   wipefs -a /dev/sdb /dev/sdc /dev/sdd /dev/sde
#
# Point at disks you don't mind destroying.
basis_lvm_devices: []  # REQUIRED, e.g. [/dev/sdb, /dev/sdc, /dev/sdd, /dev/sde]
basis_lvm_vg: basis
basis_lvm_thinpool: pool
# 256 KiB is a middle ground: 64K (default) thrashes metadata on large
# container image extracts; 1 MiB amplifies writes for etcd's 4K fsyncs.
# 256K handles both acceptably. Don't change without measuring.
basis_lvm_chunk_size: 256K
# Skip zeroing on block allocation — the chunk gets overwritten by image
# data on first write anyway, so zeroing just doubles the first-write
# cost. Safe for single-tenant k8s VMs; unsafe in multi-tenant settings
# where previously-freed data must not leak across VMs.
basis_lvm_zero_allocation: false

# Controller bind + well-known server SAN. `basis_controller_san` must
# match the SAN we put on the controller's server cert AND the value the
# agent clients set as their TLS domain name.
basis_controller_port: 7443
basis_controller_san: basis-controller

# Plain-HTTP Prometheus metrics endpoint on the controller. Scraped by
# Prometheus at /metrics; no TLS, no auth — bind to a network that only
# your Prometheus can reach.
basis_controller_metrics_port: 9443

# How much the scheduler is allowed to overcommit CPU on each host: the
# sum of assigned vCPU may exceed the host's logical CPUs by this factor.
# Memory and disk are always strict. 1.0 disables overcommit; 4.0 is
# typical for k8s workload VMs where most containers are idle most of
# the time. Must be >= 1.0.
basis_cpu_overcommit_ratio: 4.0

# Where the playbook finds binaries on the control node. Build with
# `cargo build --release` before running.
basis_repo_root: "{{ playbook_dir }}/../.."
basis_binary_dir: "{{ basis_repo_root }}/target/release"

# Local (control-node) PKI state. Certs/keys never leave the control node
# except to be copied to their specific host.
basis_pki_dir: "{{ playbook_dir }}/pki"
basis_ca_validity_days: 3650
basis_leaf_validity_days: 365

# Default IP pool. Must be a range OUTSIDE your router's DHCP pool —
# basis hands out static IPs via cloud-init, so a DHCP collision shows
# up as a broken VM with no good diagnostic.
#
# `vm_range` is where the controller auto-picks IPs for VMs. `vip_range`
# is a disjoint sub-range reserved for control-plane VIPs (one per
# cluster). They have to be disjoint so a busy cluster's VM allocation
# can never race a pending CreateCluster for a sibling's VIP.
basis_ip_pool:
  name: default
  cidr: 10.0.0.0/24
  gateway: 10.0.0.1
  vm_range_start: 10.0.0.150
  vm_range_end: 10.0.0.205
  vip_range_start: 10.0.0.100
  vip_range_end: 10.0.0.149

# Credentials for private OCI registries basis-agent pulls VM images
# from. Override in host/group vars or vault when deploying against
# private registries. Example:
#   basis_agent_registries:
#     - host: ghcr.io
#       username: "{{ ghcr_user }}"
#       password: "{{ ghcr_token }}"   # source from ansible-vault
basis_agent_registries: []

# Per-host bridge name. Set to `vmbr0` when colocating Basis on hosts
# that already run Proxmox — the agent skips bridge creation if one
# by this name already exists, and Basis's VMs end up on the same L2
# segment as Proxmox's VMs.
basis_bridge: vmbr0

# Cloud Hypervisor release to install. A static x86_64 binary from the
# official GitHub release.
cloud_hypervisor_version: "51.1"
cloud_hypervisor_url: "https://github.com/cloud-hypervisor/cloud-hypervisor/releases/download/v{{ cloud_hypervisor_version }}/cloud-hypervisor-static"

# Note: we do NOT install rust-hypervisor-firmware. basis-agent boots
# guests directly with `cloud-hypervisor --kernel --initramfs` using the
# kernel+initrd shipped as OCI layers alongside each node image. The
# firmware blob would only be needed if we switched to EFI boot.
