---
# Basis fleet bootstrap.
#
# Iteration tips:
#   ansible-playbook site.yml --limit dell1 -vv
#   ansible-playbook site.yml --tags pki       # just (re)issue certs
#   ansible-playbook site.yml --tags controller
#   ansible-playbook site.yml --tags agent
#
# Everything below is idempotent — re-running should produce no changes
# once a host is healthy.

- name: Issue CA and leaf certificates on the control node
  hosts: localhost
  gather_facts: false
  tags: [pki]
  roles:
    - basis-pki

# The controller is a control-plane process — no VMs, no KVM, no LVM
# thin pool. Only the VM-host prereqs (qemu, cloud-hypervisor, /dev/kvm,
# LVM thin pool, kernel modules) need to run on agents.
- name: Prepare VM-host prerequisites
  hosts: basis_agents
  become: true
  tags: [prereqs]
  roles:
    - basis-prereqs

# holod runs on every host (controller + agents). The cell BGP route
# reflector lives on the controller; speakers run on every agent.
# Independent systemd lifecycle from basis so a basis bounce doesn't
# drop sessions and flap VIPs.
- name: Install holod on every basis host
  hosts: basis
  become: true
  tags: [holod]
  roles:
    - basis-holod

- name: Install and run basis-controller
  hosts: basis_controller
  become: true
  tags: [controller]
  roles:
    - basis-controller

- name: Install and run basis-agent
  hosts: basis_agents
  become: true
  tags: [agent]
  roles:
    - basis-agent
