syntax = "proto3";
package basis.v1;

// CAPI-facing service — called by basis-capi-provider running in Kubernetes.
//
// Two-level model: a caller first creates a Cluster (which allocates a
// VNI + carves a CIDR + reserves a VIP), then creates Machines inside
// that cluster. All placement decisions (host, GPUs, IP, storage pool,
// device) belong to the controller — callers describe intent, not
// placement.
//
// Network model: each cluster gets its own VXLAN VNI and CIDR. There is
// no inter-cluster reachability at the underlay — cross-cluster traffic
// goes through cell-public LB VIPs (typically Istio east-west gateways).
// Trust domains live entirely in the mesh layer (SPIFFE / Istio
// MeshNetworks); basis just provides isolated per-cluster networks and
// BGP-advertised VIPs.
service Basis {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (Cluster);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);

  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse);
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse);
  rpc GetMachine(GetMachineRequest) returns (Machine);
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);

  // Storage pool / device telemetry + per-device fencing. Read paths
  // surface per-pool capacity in the four layers (configured / ready /
  // schedulable_total / schedulable_free) plus per-device health and
  // scheduling state.
  //
  // SetDeviceSchedulingState is the operator's "stop placing on this
  // device" gate; it sets a flag so the scheduler refuses new
  // placements. It does NOT touch existing reservations — rebalancing
  // data off a held disk is the storage system's job (Ceph/Rook/
  // Longhorn/etc), not basis's. The flag exists so a planned drive
  // retirement doesn't race the storage system's own eviction.
  rpc ListPools(ListPoolsRequest) returns (ListPoolsResponse);
  rpc SetDeviceSchedulingState(SetDeviceSchedulingStateRequest)
      returns (SetDeviceSchedulingStateResponse);
}

// Agent-facing service — agents connect outbound and receive commands
// over a bidirectional stream.
service BasisAgent {
  rpc StreamMessages(stream AgentMessage) returns (stream ControllerCommand);
}

// --- Cluster messages ---

message CreateClusterRequest {
  // Human-readable cluster name. Must be unique across the Basis
  // controller. Used in logs and as the `cluster` label on VMs.
  string name = 1;
  // Named pool the cluster's external IPs come from — always the
  // LoadBalancer Service block, and the apiserver VIP too when
  // `apiserver_visibility = APISERVER_PUBLIC`. Required: the pool
  // name must match an entry in the controller's `network.pools[]`.
  // Allocations are BGP-advertised cell-wide.
  string external_ip_pool = 2;
  // Number of LoadBalancer Service IPs this cluster gets, exposed to
  // Cilium via a CiliumLoadBalancerIPPool. Must be a power of two so
  // the controller can carve an aligned /N out of the pool. 0 falls
  // back to the cell-wide default in `network.defaultExternalServiceIps`.
  uint32 external_service_ips = 3;
  // Where the apiserver VIP lives. See `ApiserverVisibility`. Default
  // `APISERVER_PUBLIC` — safe for the root mgmt cluster where the
  // operator's `lattice install` needs direct LAN reachability.
  // Workload clusters set `APISERVER_PRIVATE` to keep their apiserver
  // inside the cluster CIDR (CAPI access flows through the parent
  // cell's lattice-operator API proxy).
  ApiserverVisibility apiserver_visibility = 4;
  // Trust-domain label that scopes the eager-bootstrap fan-out for
  // tree-scoped pool VIPs.
  string trust_domain = 5;
}

enum ApiserverVisibility {
  APISERVER_PUBLIC = 0;
  APISERVER_PRIVATE = 1;
}

message CreateClusterResponse {
  string cluster_id = 1;
  string control_plane_endpoint = 2;
  uint32 vni = 3;
  string cidr = 4;
  string service_block_cidr = 5;
  string bgp_reflector_address = 6;
  uint32 bgp_asn = 7;
}

message DeleteClusterRequest {
  string cluster_id = 1;
}

message DeleteClusterResponse {}

message GetClusterRequest {
  string cluster_id = 1;
}

message Cluster {
  string cluster_id = 1;
  string name = 2;
  string control_plane_endpoint = 3;
  uint32 vni = 4;
  string cidr = 5;
  string service_block_cidr = 6;
  ApiserverVisibility apiserver_visibility = 7;
  string trust_domain = 8;
}

message ListClustersRequest {}

message ListClustersResponse {
  repeated Cluster clusters = 1;
}

// --- Machine messages ---

message CreateMachineRequest {
  // Cluster this machine belongs to. Returned from CreateCluster.
  string cluster_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  uint32 gpus = 8;
  GPUConstraints gpu_constraints = 9;
  // Additional raw block devices attached alongside the rootfs. Each
  // becomes a plain virtio-blk device (`/dev/vdc`, `/dev/vdd`, …) —
  // handed to the guest unformatted. Storage pool / device chosen by
  // the controller based on `selector` and `purpose`.
  repeated StorageDisk storage_disks = 10;
  // Optional host placement spec (operates on host labels, not pool
  // labels). Both `requires` and `prefers` default to empty — empty
  // means "no constraint" and the scheduler picks wherever capacity
  // fits.
  LabelSelector placement = 11;
}

// Unified label selector used for both host placement (against
// `RegisterHostRequest.labels`) and storage pool placement (against
// `host.yaml`'s `pool.labels`). One type, one matcher, one set of
// validation rules. Both lists default to empty (no constraint).
message LabelSelector {
  // Hard filter. The target satisfies a single requirement when its
  // labels contain `key` with a value in `values`. Every entry must be
  // satisfied. CreateMachine fails with `FailedPrecondition` when
  // nothing satisfies all entries — distinguishable from out-of-capacity.
  repeated PlacementRequirement requires = 1;
  // Soft tiebreaker. Each match contributes `weight` to the candidate's
  // score; higher score wins among hard-filter survivors.
  repeated PlacementPreference prefers = 2;
}

message PlacementRequirement {
  string key = 1;
  repeated string values = 2;
}

message PlacementPreference {
  string key = 1;
  string value = 2;
  uint32 weight = 3;
}

// Workload role of a data disk. Drives scheduling semantics, not just
// telemetry.
//   REPLICATED: this disk is one replica of a per-Lattice-cluster
//               replicated-storage scheme (Rook/Ceph OSD, Longhorn
//               replica, Mayastor pool, OpenEBS LocalPV-with-Replicas,
//               SeaweedFS volume server, etc). Hierarchical
//               same-cluster anti-affinity: spread across hosts first,
//               then across devices on the same host; never co-locate
//               two replicas of the same Lattice cluster on the same
//               physical device. Basis stays workload-agnostic — it
//               doesn't know which CSI driver claims the disk in-
//               guest, only that the disk participates in a
//               replication scheme that requires failure-domain
//               independence.
//   GENERIC_DATA: respects labels + capacity + a soft same-VM device
//                 spread, but no cluster anti-affinity. Use for
//                 single-replica workloads (etcd snapshots, container
//                 logs, app state) where co-location with peers is
//                 fine.
// `UNSPECIFIED` is invalid after CRD admission/defaulting and the
// scheduler rejects it; the CAPI provider's defaulting webhook owns
// inference from MachineDeployment role.
enum DiskPurpose {
  DISK_PURPOSE_UNSPECIFIED = 0;
  DISK_PURPOSE_REPLICATED = 1;
  DISK_PURPOSE_GENERIC_DATA = 2;
}

// One requested data disk. The controller resolves `selector` against
// host pool labels and picks a (host, pool, device) tuple at scheduling
// time; the agent receives the resolved `CommandedDisk` with no
// selector logic to re-run.
message StorageDisk {
  // Minimum requested capacity. Backends MAY satisfy with more (raw-
  // disk hands the guest the whole device; nvme-namespace rounds up to
  // controller granularity). The actual allocated size is reported
  // back in `DiskAssignment.actual_size_gib`.
  uint64 min_size_gib = 1;
  // Pool selector. Empty `requires` matches every pool; empty `prefers`
  // adds zero score.
  LabelSelector selector = 2;
  // Workload role; see `DiskPurpose`.
  DiskPurpose purpose = 3;
}

// Resolved per-disk placement, from controller to agent. `assignment_id`
// is the idempotency key — if the agent already has a Ready reservation
// with this id, allocate is a no-op returning the existing path; if a
// row with the same `(vm_id, disk_index)` exists with a different
// `assignment_id`, hard conflict.
message CommandedDisk {
  string assignment_id = 1;
  uint64 min_size_gib = 2;
  string pool = 3;
  string device_id = 4;
  uint32 disk_index = 5;
  string cluster_id = 6;
  DiskPurpose purpose = 7;
}

// Agent-reported back to the controller after a successful allocate.
// The controller renders accurate per-disk status (raw-disk handed
// the guest 3725 GiB even though the request was for 175).
message DiskAssignment {
  string assignment_id = 1;
  string vm_id = 2;
  uint32 disk_index = 3;
  string pool = 4;
  string device_id = 5;
  uint64 actual_size_gib = 6;
  string device_path = 7;
}

message CreateMachineResponse {
  string id = 1;
  string provider_id = 2;
  string ip_address = 3;
  string host = 4;
}

message DeleteMachineRequest {
  string id = 1;
}

message DeleteMachineResponse {}

message GetMachineRequest {
  string id = 1;
}

message ListMachinesRequest {
  string cluster_id = 1;
}

message ListMachinesResponse {
  repeated Machine machines = 1;
}

message Machine {
  string id = 1;
  string name = 2;
  string cluster_id = 3;
  string host = 4;
  string provider_id = 5;
  string ip_address = 6;
  MachineState state = 7;
  uint32 cpu = 8;
  uint32 memory_mib = 9;
  uint32 disk_gib = 10;
  repeated MachineGPU gpus = 11;
  string error_message = 12;
  // Live disk assignments populated as the agent acks each disk's
  // allocate. Surfaced to operators (`basisctl get machine`) and to
  // CAPI for status.
  repeated DiskAssignment storage_disks = 13;
}

message MachineGPU {
  string pci_address = 1;
  string model = 2;
  uint32 nvlink_group = 3;
}

enum MachineState {
  PENDING = 0;
  CREATING = 1;
  RUNNING = 2;
  STOPPING = 3;
  STOPPED = 4;
  FAILED = 5;
  PENDING_TEARDOWN = 6;
}

message GPUConstraints {
  uint32 min_group_size = 1;
}

message GPUDevice {
  string pci_address = 1;
  string model = 2;
  string iommu_group = 3;
  uint32 nvlink_group = 4;
}

// --- Agent stream messages ---

message AgentMessage {
  oneof payload {
    RegisterHostRequest register = 1;
    HeartbeatRequest heartbeat = 2;
    ReportVMStateRequest vm_state = 3;
    TombstoneAck tombstone_ack = 4;
    // Reported once per disk after a successful allocate. The
    // controller flips the matching pool_disk_assignment row to
    // `committed` and stores actual_size_gib + device_path. Idempotent
    // — the agent re-reports on stream reconnect after restart so the
    // controller resyncs without a separate poll.
    DiskAssignmentReport disk_assignment = 5;
  }
}

message DiskAssignmentReport {
  DiskAssignment assignment = 1;
}

message ControllerCommand {
  string request_id = 1;
  oneof command {
    CreateVMCommand create_vm = 2;
    RegisterHostResponse register_ack = 4;
    ReconcileHostCommand reconcile_host = 5;
  }
}

message ReconcileHostCommand {
  repeated ClusterState clusters = 1;
  repeated ClusterTombstone cluster_tombstones = 2;
  repeated string vm_tombstones = 3;
}

message ClusterTombstone {
  uint32 vni = 1;
  string cluster_id = 2;
  string cidr = 3;
}

message TombstoneAck {
  repeated uint32 cluster_vnis = 1;
  repeated string vm_ids = 2;
}

message RegisterHostResponse {
  string host_id = 1;
  ReconcileHostCommand initial_state = 2;
  uint32 bgp_asn = 3;
  string bgp_reflector_address = 4;
}

message ClusterState {
  string cluster_id = 1;
  uint32 vni = 2;
  string cidr = 3;
  string gateway_ip = 4;
  uint32 prefix_len = 5;
  repeated string vtep_addresses = 6;
  string trust_domain = 9;
  repeated ClusterVip cluster_vips = 7;
  repeated string internal_cluster_vips = 8;
}

message ClusterVip {
  string cidr = 1;
  string owner_host_id = 2;
}

// --- Agent registration ---

message RegisterHostRequest {
  string hostname = 1;
  uint32 total_cpu = 2;
  uint64 total_memory_mib = 3;
  // Per-pool capacity snapshot at register time. Refreshed on every
  // heartbeat. The scheduler reads from heartbeat-fresh values, not
  // from this snapshot.
  StorageCapacity storage_capacity = 4;
  repeated GPUDevice gpus = 5;
  string vtep_address = 6;
  uint32 rank = 7;
  // Operator-assigned host labels (e.g. {"tier": "fast", "gpu": "h100"}).
  // Used by `LabelSelector` against host placement. Reported once at
  // registration; change requires basis-agent restart.
  map<string, string> labels = 8;
  HostInventory current_inventory = 9;
}

message HostInventory {
  repeated string vm_ids = 1;
  repeated InventoryCluster clusters = 2;
}

message InventoryCluster {
  uint32 vni = 1;
  string cidr = 2;
}

message HeartbeatRequest {
  StorageCapacity storage_capacity = 1;
}

// Per-pool capacity, reported on every heartbeat so the scheduler's
// per-pool budgets stay live, not registration-stale. Two parts:
// rootfs (one thin pool per host) and the per-data-pool list.
message StorageCapacity {
  RootfsCapacity rootfs = 1;
  // One entry per `pool` declared in the agent's `host.yaml` storage
  // pools list. Empty means the host has no data pools (legal — a
  // worker host with no replicated storage role).
  repeated PoolCapacity pools = 2;
}

// rootfs thin-pool capacity, including thin-metadata.
message RootfsCapacity {
  uint64 total_bytes = 1;
  uint64 free_bytes = 2;
  uint64 metadata_total_bytes = 3;
  uint64 metadata_free_bytes = 4;
}

// One data pool's capacity, decomposed into the four layers operators
// need to distinguish.
message PoolCapacity {
  string pool = 1;
  // Backend type — `lvm-linear`, `raw-disk`, `nvme-namespace`. M1 only
  // emits `lvm-linear`.
  string backend = 2;
  // Operator-written labels (tier, medium, etc).
  map<string, string> labels = 3;
  // Sum of every configured device's size, regardless of state.
  uint64 configured_total_bytes = 4;
  // Sum of devices physically Ready (excludes Degraded/Missing).
  uint64 ready_total_bytes = 5;
  // Sum of devices that are physically Ready AND scheduling-Enabled.
  // The actual placement budget; what the scheduler compares against.
  uint64 schedulable_total_bytes = 6;
  // Free capacity on the schedulable subset.
  uint64 schedulable_free_bytes = 7;
  // Per-device breakdown for telemetry and per-device drilldown.
  repeated DeviceCapacity devices = 8;
}

// One device within a pool.
message DeviceCapacity {
  // Stable `/dev/disk/by-id/...` identifier (or controller id for
  // nvme-namespace pools).
  string device_id = 1;
  uint64 total_bytes = 2;
  uint64 free_bytes = 3;
  // Physical health, reported by the agent's hardware scan.
  DevicePhysicalHealth physical = 4;
  // Free-form reason when `physical != READY` (e.g. SMART threshold,
  // drive missing). Empty when Ready.
  string physical_reason = 5;
}

enum DevicePhysicalHealth {
  DEVICE_HEALTH_UNSPECIFIED = 0;
  DEVICE_HEALTH_READY = 1;
  DEVICE_HEALTH_DEGRADED = 2;
  DEVICE_HEALTH_MISSING = 3;
}

// --- Pool / drain RPCs ---

message ListPoolsRequest {
  // Optional host filter. Empty = every host the controller knows
  // about; non-empty = only that host's pools.
  string host_id = 1;
}

message ListPoolsResponse {
  repeated PoolStatus pools = 1;
}

// One row per `(host_id, pool)` with everything `basisctl pool show`
// + the global `pool list` and `pool health` views need. Per-disk
// reservations are joined in by `cluster_id` so operators can audit
// the same-cluster anti-affinity decisions.
message PoolStatus {
  string host_id = 1;
  string pool = 2;
  string backend = 3;
  map<string, string> labels = 4;
  uint64 configured_total_bytes = 5;
  uint64 ready_total_bytes = 6;
  uint64 schedulable_total_bytes = 7;
  uint64 schedulable_free_bytes = 8;
  // Pool-level rollup; mutually exclusive states.
  PoolHealthState pool_health = 9;
  repeated DeviceStatus devices = 10;
}

enum PoolHealthState {
  POOL_HEALTH_UNSPECIFIED = 0;
  POOL_HEALTH_READY = 1;
  POOL_HEALTH_DEGRADED = 2;
  POOL_HEALTH_UNHEALTHY = 3;
}

message DeviceStatus {
  string device_id = 1;
  uint64 total_bytes = 2;
  uint64 free_bytes = 3;
  DevicePhysicalHealth physical = 4;
  // Free-form when `physical != READY` — SMART threshold, missing,
  // etc. Empty when Ready.
  string physical_reason = 5;
  // Operator-driven knob: `enabled` (default) or `disabled`. The
  // disabled state fences placement only — existing reservations
  // are unaffected. See `SetDeviceSchedulingState` for rationale.
  string scheduling_state = 6;
  string scheduling_reason = 7;
  // Per-cluster reservation count for failure-domain audit. The
  // `(cluster, count)` pairs let `basisctl pool show` print "OSD
  // count by cluster" without an extra round-trip.
  repeated ClusterReservationCount reservations = 8;
}

message ClusterReservationCount {
  string cluster_id = 1;
  uint32 count = 2;
}

message SetDeviceSchedulingStateRequest {
  string host_id = 1;
  string pool = 2;
  string device_id = 3;
  // `enabled` clears any disabled marker; `disabled` sets one.
  string state = 4;
  // Free-form; surfaced in PoolStatus + telemetry.
  string reason = 5;
}

message SetDeviceSchedulingStateResponse {}

message ReportVMStateRequest {
  string vm_id = 1;
  MachineState state = 2;
  string error_message = 3;
  bool transient = 4;
}

// --- Controller -> Agent commands ---

message CreateVMCommand {
  string vm_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  string ip_address = 8;
  string gateway = 9;
  uint32 prefix_len = 10;
  uint32 gpus = 11;
  GPUConstraints gpu_constraints = 12;
  repeated string dns_servers = 13;
  repeated string gpu_pci_addresses = 14;
  // Resolved data disks. Pool + device + assignment_id are picked by
  // the controller; agent only allocates.
  repeated CommandedDisk storage_disks = 15;
  uint32 vni = 16;
  // Lattice cluster id this VM belongs to. Mirrored from the VM's
  // cluster — the agent uses it for the same-cluster REPLICATED
  // collision guardrail (defense-in-depth invariant 7).
  string cluster_id = 17;
}
