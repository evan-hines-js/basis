syntax = "proto3";
package basis.v1;

// CAPI-facing service — called by basis-capi-provider running in Kubernetes.
//
// Two-level model: a caller first creates a Cluster (which materializes
// or joins a tree and reserves a VIP), then creates Machines inside that
// cluster. All placement decisions (host, GPUs, IP) belong to the
// controller — callers describe intent, not placement.
service Basis {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (Cluster);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);

  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse);
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse);
  rpc GetMachine(GetMachineRequest) returns (Machine);
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);
}

// Agent-facing service — agents connect outbound and receive commands
// over a bidirectional stream.
service BasisAgent {
  rpc StreamMessages(stream AgentMessage) returns (stream ControllerCommand);
}

// --- Cluster messages ---

message CreateClusterRequest {
  // Human-readable cluster name. Must be unique across the Basis
  // controller. Used in logs and as the `cluster` label on VMs.
  string name = 1;
  // If set, this cluster joins the tree of the referenced parent
  // cluster. If empty, this cluster is a tree root — the controller
  // materializes a new tree (allocates a VNI, carves a CIDR) before
  // inserting the cluster row.
  string parent_cluster_id = 2;
  // Named pool the apiserver VIP is carved from. Empty selects the
  // cluster's own tree vip_range (nested cluster, VIP stays inside
  // the overlay, external access goes through a parent-cell auth
  // proxy). Any non-empty name resolves to a pool in the
  // controller's `network.pools[]`. Pool /32s are advertised by the
  // host running the VIP-claiming VM via the cell's BGP reflector;
  // VMs are single-homed on the tree NIC and don't need to be on
  // the LAN themselves.
  string apiserver_vip_pool = 3;
}

message CreateClusterResponse {
  string cluster_id = 1;
  // Control-plane endpoint VIP, allocated by the controller from
  // whichever pool the caller named in `apiserver_vip_pool` (or the
  // tree vip_range when that field is empty). Recorded onto the
  // caller's `InfrastructureCluster` CR; CAPI core propagates it to
  // `Cluster.spec.controlPlaneEndpoint`.
  string control_plane_endpoint = 2;
  // Tree this cluster belongs to. Root clusters materialize a new
  // tree; children inherit their parent's.
  string tree_id = 3;
  // VXLAN Network Identifier for the tree. 24-bit.
  uint32 vni = 4;
}

message DeleteClusterRequest {
  string cluster_id = 1;
}

message DeleteClusterResponse {}

message GetClusterRequest {
  string cluster_id = 1;
}

message Cluster {
  string cluster_id = 1;
  string name = 2;
  string tree_id = 3;
  string parent_cluster_id = 4;
  string control_plane_endpoint = 5;
  uint32 vni = 6;
}

message ListClustersRequest {}

message ListClustersResponse {
  repeated Cluster clusters = 1;
}

// --- Machine messages ---

message CreateMachineRequest {
  // Cluster this machine belongs to. Returned from CreateCluster.
  string cluster_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  uint32 gpus = 8;
  GPUConstraints gpu_constraints = 9;
  // Additional raw block devices attached alongside the rootfs. Each
  // becomes a plain virtio-blk device (`/dev/vdc`, `/dev/vdd`, …) —
  // handed to the guest unformatted so an in-cluster storage operator
  // (Rook/Ceph) can claim and manage them directly.
  repeated ExtraDisk extra_disks = 10;
}

message ExtraDisk {
  uint32 size_gib = 1;
}

message CreateMachineResponse {
  string id = 1;
  string provider_id = 2;
  string ip_address = 3;
  string host = 4;
}

message DeleteMachineRequest {
  string id = 1;
}

message DeleteMachineResponse {}

message GetMachineRequest {
  string id = 1;
}

message ListMachinesRequest {
  string cluster_id = 1;
}

message ListMachinesResponse {
  repeated Machine machines = 1;
}

message Machine {
  string id = 1;
  string name = 2;
  string cluster_id = 3;
  string host = 4;
  string provider_id = 5;
  string ip_address = 6;
  MachineState state = 7;
  uint32 cpu = 8;
  uint32 memory_mib = 9;
  uint32 disk_gib = 10;
  repeated MachineGPU gpus = 11;
  string error_message = 12;
  repeated ExtraDisk extra_disks = 13;
}

message MachineGPU {
  string pci_address = 1;
  string model = 2;
  uint32 nvlink_group = 3;
}

enum MachineState {
  PENDING = 0;
  CREATING = 1;
  RUNNING = 2;
  STOPPING = 3;
  STOPPED = 4;
  FAILED = 5;
}

message GPUConstraints {
  uint32 min_group_size = 1;
}

message GPUDevice {
  string pci_address = 1;
  string model = 2;
  string iommu_group = 3;
  uint32 nvlink_group = 4;
}

// --- Agent stream messages ---

message AgentMessage {
  oneof payload {
    RegisterHostRequest register = 1;
    HeartbeatRequest heartbeat = 2;
    ReportVMStateRequest vm_state = 3;
  }
}

message ControllerCommand {
  string request_id = 1;
  oneof command {
    CreateVMCommand create_vm = 2;
    DeleteVMCommand delete_vm = 3;
    RegisterHostResponse register_ack = 4;
    // Authoritative list of VMs + trees this host should carry. Fired
    // on every relevant state change (VM create/delete, host joins or
    // leaves a tree, peer-set shift) AND periodically so missed pushes
    // converge. Agent reconciles local state to match — deletes VMs
    // not in the list, builds bridges for trees not yet present,
    // tears down bridges for trees no longer in the list, replaces
    // FDB entries to match each tree's `vtep_addresses`.
    ReconcileHostCommand reconcile_host = 5;
  }
}

// The full authoritative view the controller holds of a single host.
// One message drives three invariants: VM set, tree set, per-tree
// peer VTEPs. There is no separate incremental message — every
// relevant change re-sends this, and the periodic tick does too, so
// there's exactly one code path on the agent that turns controller
// state into host state.
message ReconcileHostCommand {
  repeated string expected_vm_ids = 1;
  repeated TreeState trees = 2;
}

message RegisterHostResponse {
  string host_id = 1;
  // Initial state the agent should reconcile against. Equivalent to
  // the first `ReconcileHostCommand` the agent would receive on the
  // next tick — sent inline so the agent can converge before
  // accepting CreateVm commands.
  ReconcileHostCommand initial_state = 2;
  // Cell BGP parameters. Every host runs `holod` and peers iBGP with
  // the cell route reflector (running as the controller's local
  // holod) at the cell ASN. The agent uses these to seed its own
  // local holod's BGP instance.
  uint32 bgp_asn = 3;
  // Underlay IP of the controller's BGP listener (tcp/179). Sourced
  // from `BasisControllerSpec.bgp.routerId` in the controller config.
  string bgp_reflector_address = 4;
}

// One tree's dataplane state the agent materialises locally.
// `gateway_ip`/`prefix_len` are assigned to the host's own `brt<vni>`
// so the host kernel acquires a route to the tree's CIDR via that
// bridge — without this, a host can't reach VMs on its own tree.
message TreeState {
  uint32 vni = 1;
  // This host's per-tree gateway IP, carved from the tree's
  // `bridge_range`. Assigned to the local `brt<vni>`; every VM the
  // host owns in this tree uses it as default gateway. Different
  // hosts receive different addresses from the same range so
  // cross-host replies routing through the gateway always land on
  // the correct hypervisor.
  string gateway_ip = 2;
  uint32 prefix_len = 3;
  // VTEP addresses of every hypervisor currently carrying a VM of
  // this tree. Learning is disabled on the VXLAN device, so this
  // list is the FDB's BUM destination set.
  repeated string vtep_addresses = 4;
  // The tree's full CIDR (e.g. "10.0.0.0/20"). Used by the agent
  // to install a source-scoped MASQUERADE rule so tree packets
  // egress the uplink with the host's LAN IP — host-originated
  // traffic is left untouched.
  string cidr = 5;
  // Pool-scoped cluster VIPs in this tree, as /32 prefixes. The
  // agent advertises these via BGP (with self as next-hop) so they
  // route to the tree from upstream; tree-scoped VIPs (inside
  // `cidr`) are reachable through the tree CIDR advertisement and
  // are NOT included here. Every host carrying the tree advertises
  // the same VIP set — kube-vip leader election within the tree
  // settles which CP VM owns the VIP at any moment, and cross-host
  // VXLAN forwarding gets traffic to whichever host runs the leader.
  repeated string cluster_vips = 6;
}

// --- Agent registration ---

message RegisterHostRequest {
  string hostname = 1;
  uint32 total_cpu = 2;
  uint64 total_memory_mib = 3;
  uint64 total_disk_gib = 4;
  repeated GPUDevice gpus = 5;
  // IP address the agent will use as the source for outgoing VXLAN
  // frames. Almost always the uplink interface's address. Reported
  // once at registration; the controller stores it on `hosts` and
  // includes it in `TreeState.vtep_addresses` broadcasts.
  string vtep_address = 6;
}

message HeartbeatRequest {
  string host_id = 1;
}

message ReportVMStateRequest {
  string vm_id = 1;
  MachineState state = 2;
  string error_message = 3;
  bool transient = 4;
}

// --- Controller -> Agent commands ---

message CreateVMCommand {
  string vm_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  // Primary IP (on the tree's VXLAN), gateway and prefix are the tree's.
  string ip_address = 8;
  string gateway = 9;
  uint32 prefix_len = 10;
  uint32 gpus = 11;
  GPUConstraints gpu_constraints = 12;
  repeated string dns_servers = 13;
  repeated string gpu_pci_addresses = 14;
  repeated ExtraDisk extra_disks = 15;
  // VXLAN Network Identifier of the tree this VM joins at L2. The
  // agent derives the bridge name from this and attaches the VM's
  // primary TAP to it. The bridge itself is kept alive by
  // `ReconcileHostCommand` — which precedes this command on the same
  // mpsc stream whenever a new tree shows up on the host.
  uint32 vni = 16;
}

message DeleteVMCommand {
  string vm_id = 1;
}
