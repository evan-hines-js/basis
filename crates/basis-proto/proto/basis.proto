syntax = "proto3";
package basis.v1;

// CAPI-facing service — called by basis-capi-provider running in Kubernetes.
//
// Two-level model: a caller first creates a Cluster (which allocates a
// VNI + carves a CIDR + reserves a VIP), then creates Machines inside
// that cluster. All placement decisions (host, GPUs, IP) belong to the
// controller — callers describe intent, not placement.
//
// Network model: each cluster gets its own VXLAN VNI and CIDR. There is
// no inter-cluster reachability at the underlay — cross-cluster traffic
// goes through cell-public LB VIPs (typically Istio east-west gateways).
// Trust domains live entirely in the mesh layer (SPIFFE / Istio
// MeshNetworks); basis just provides isolated per-cluster networks and
// BGP-advertised VIPs.
service Basis {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (Cluster);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);

  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse);
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse);
  rpc GetMachine(GetMachineRequest) returns (Machine);
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);
}

// Agent-facing service — agents connect outbound and receive commands
// over a bidirectional stream.
service BasisAgent {
  rpc StreamMessages(stream AgentMessage) returns (stream ControllerCommand);
}

// --- Cluster messages ---

message CreateClusterRequest {
  // Human-readable cluster name. Must be unique across the Basis
  // controller. Used in logs and as the `cluster` label on VMs.
  string name = 1;
  // Named pool the cluster's external IPs come from — always the
  // LoadBalancer Service block, and the apiserver VIP too when
  // `apiserver_visibility = APISERVER_PUBLIC`. Required: the pool
  // name must match an entry in the controller's `network.pools[]`.
  // Allocations are BGP-advertised cell-wide.
  string external_ip_pool = 2;
  // Number of LoadBalancer Service IPs this cluster gets, exposed to
  // Cilium via a CiliumLoadBalancerIPPool. Must be a power of two so
  // the controller can carve an aligned /N out of the pool. 0 falls
  // back to the cell-wide default in `network.defaultExternalServiceIps`.
  uint32 external_service_ips = 3;
  // Where the apiserver VIP lives. See `ApiserverVisibility`. Default
  // `APISERVER_PUBLIC` — safe for the root mgmt cluster where the
  // operator's `lattice install` needs direct LAN reachability.
  // Workload clusters set `APISERVER_PRIVATE` to keep their apiserver
  // inside the cluster CIDR (CAPI access flows through the parent
  // cell's lattice-operator API proxy).
  ApiserverVisibility apiserver_visibility = 4;
  // Trust-domain label, propagated to BGP communities in Phase 2 of
  // the network design so VIPs are only installed on hosts whose
  // local clusters subscribe to the same trust domain. Empty (the
  // default) means "untagged" — VIPs propagate to every host in the
  // cell. Phase 1 stores the field but doesn't wire it through to
  // holod yet.
  string trust_domain = 5;
}

enum ApiserverVisibility {
  // Apiserver VIP from `external_ip_pool`, BGP-advertised cell-wide.
  // Required for the root mgmt cluster.
  APISERVER_PUBLIC = 0;
  // Apiserver VIP from the cluster's CIDR (last usable), private to
  // the cluster. Reachable only from within the cluster's bridge.
  APISERVER_PRIVATE = 1;
}

message CreateClusterResponse {
  string cluster_id = 1;
  // Control-plane endpoint — the cluster's apiserver VIP. Where it
  // lives depends on `apiserver_visibility` chosen at create time:
  // `APISERVER_PUBLIC` puts it in `external_ip_pool` (BGP-advertised
  // cell-wide); `APISERVER_PRIVATE` puts it at the last usable of
  // `cidr` (private to the cluster, accessed via the parent cell's
  // lattice-operator API proxy over the agent's reverse-tunneled
  // gRPC stream).
  string control_plane_endpoint = 2;
  // VXLAN Network Identifier of this cluster's overlay. 24-bit;
  // unique within the cell.
  uint32 vni = 3;
  // CIDR of the cluster's overlay (e.g. `10.42.0.0/24`). The bottom
  // `bridgeReserve` addresses hold per-host gateway IPs (assigned by
  // the controller on first VM scheduled to a host); the rest are VM
  // IPs (less the apiserver VIP slot when private).
  string cidr = 4;
  // CIDR of the cluster's LoadBalancer Service block, allocated from
  // the named pool. Empty when the cluster requested 0 service IPs.
  string service_block_cidr = 5;
}

message DeleteClusterRequest {
  string cluster_id = 1;
}

message DeleteClusterResponse {}

message GetClusterRequest {
  string cluster_id = 1;
}

message Cluster {
  string cluster_id = 1;
  string name = 2;
  string control_plane_endpoint = 3;
  uint32 vni = 4;
  string cidr = 5;
  // Same shape as `CreateClusterResponse.service_block_cidr`. Empty
  // when the cluster has no LoadBalancer Service block.
  string service_block_cidr = 6;
  ApiserverVisibility apiserver_visibility = 7;
  string trust_domain = 8;
}

message ListClustersRequest {}

message ListClustersResponse {
  repeated Cluster clusters = 1;
}

// --- Machine messages ---

message CreateMachineRequest {
  // Cluster this machine belongs to. Returned from CreateCluster.
  string cluster_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  uint32 gpus = 8;
  GPUConstraints gpu_constraints = 9;
  // Additional raw block devices attached alongside the rootfs. Each
  // becomes a plain virtio-blk device (`/dev/vdc`, `/dev/vdd`, …) —
  // handed to the guest unformatted so an in-cluster storage operator
  // (Rook/Ceph) can claim and manage them directly.
  repeated ExtraDisk extra_disks = 10;
}

message ExtraDisk {
  uint32 size_gib = 1;
}

message CreateMachineResponse {
  string id = 1;
  string provider_id = 2;
  string ip_address = 3;
  string host = 4;
}

message DeleteMachineRequest {
  string id = 1;
}

message DeleteMachineResponse {}

message GetMachineRequest {
  string id = 1;
}

message ListMachinesRequest {
  string cluster_id = 1;
}

message ListMachinesResponse {
  repeated Machine machines = 1;
}

message Machine {
  string id = 1;
  string name = 2;
  string cluster_id = 3;
  string host = 4;
  string provider_id = 5;
  string ip_address = 6;
  MachineState state = 7;
  uint32 cpu = 8;
  uint32 memory_mib = 9;
  uint32 disk_gib = 10;
  repeated MachineGPU gpus = 11;
  string error_message = 12;
  repeated ExtraDisk extra_disks = 13;
}

message MachineGPU {
  string pci_address = 1;
  string model = 2;
  uint32 nvlink_group = 3;
}

enum MachineState {
  PENDING = 0;
  CREATING = 1;
  RUNNING = 2;
  STOPPING = 3;
  STOPPED = 4;
  FAILED = 5;
}

message GPUConstraints {
  uint32 min_group_size = 1;
}

message GPUDevice {
  string pci_address = 1;
  string model = 2;
  string iommu_group = 3;
  uint32 nvlink_group = 4;
}

// --- Agent stream messages ---

message AgentMessage {
  oneof payload {
    RegisterHostRequest register = 1;
    HeartbeatRequest heartbeat = 2;
    ReportVMStateRequest vm_state = 3;
  }
}

message ControllerCommand {
  string request_id = 1;
  oneof command {
    CreateVMCommand create_vm = 2;
    DeleteVMCommand delete_vm = 3;
    RegisterHostResponse register_ack = 4;
    // Authoritative list of VMs + clusters this host should carry.
    // Fired on every relevant state change (VM create/delete, host
    // joins or leaves a cluster, peer-set shift) AND periodically so
    // missed pushes converge. Agent reconciles local state to match —
    // deletes VMs not in the list, builds bridges for clusters not
    // yet present, tears down bridges for clusters no longer in the
    // list, replaces FDB entries to match each cluster's
    // `vtep_addresses`.
    ReconcileHostCommand reconcile_host = 5;
  }
}

// The full authoritative view the controller holds of a single host.
// One message drives three invariants: VM set, cluster set, per-cluster
// peer VTEPs. There is no separate incremental message — every relevant
// change re-sends this, and the periodic tick does too, so there's
// exactly one code path on the agent that turns controller state into
// host state.
message ReconcileHostCommand {
  repeated string expected_vm_ids = 1;
  repeated ClusterState clusters = 2;
}

message RegisterHostResponse {
  string host_id = 1;
  // Initial state the agent should reconcile against. Equivalent to
  // the first `ReconcileHostCommand` the agent would receive on the
  // next tick — sent inline so the agent can converge before
  // accepting CreateVm commands.
  ReconcileHostCommand initial_state = 2;
  // Cell BGP parameters. Every host runs `holod` and peers iBGP with
  // the cell route reflector (running as the controller's local
  // holod) at the cell ASN. The agent uses these to seed its own
  // local holod's BGP instance.
  uint32 bgp_asn = 3;
  // Underlay IP of the controller's BGP listener (tcp/179). Sourced
  // from `BasisControllerSpec.bgp.routerId` in the controller config.
  string bgp_reflector_address = 4;
}

// One cluster's dataplane state the agent materialises locally.
// `gateway_ip` is per-host (carved from the cluster's `bridge_range`
// by the controller and unique among all hosts carrying the cluster);
// every VM the host owns in this cluster uses it as default gateway.
// Different hosts get different addresses so cross-host replies
// routing back through the gateway always land on the originating
// hypervisor — anycast on a shared IP would require EVPN-style ARP
// suppression we don't have yet.
message ClusterState {
  // Cluster ID — opaque, used in logs.
  string cluster_id = 1;
  // VXLAN Network Identifier of this cluster's overlay. 24-bit.
  uint32 vni = 2;
  // The cluster's full CIDR (e.g. "10.42.0.0/24"). Used to scope the
  // per-cluster MASQUERADE rule so cluster packets egress the uplink
  // with the host's LAN IP.
  string cidr = 3;
  // This host's per-cluster bridge IP, carved from the cluster's
  // `bridge_range`. Assigned to the local `brc<vni>` so the kernel
  // acquires a route to the cluster CIDR via that bridge — without
  // this, the host can't reach VMs on its own cluster.
  string gateway_ip = 4;
  uint32 prefix_len = 5;
  // VTEP addresses of every hypervisor currently carrying a VM of
  // this cluster. Learning is disabled on the VXLAN device, so this
  // list is the FDB's BUM destination set.
  repeated string vtep_addresses = 6;
  // Cluster VIPs (apiserver VIP when `APISERVER_PUBLIC` + LB Service
  // block) as `<addr>/<prefix>` strings. The agent advertises these
  // via BGP (with self as next-hop) so they route to the cluster
  // from upstream. Every host carrying the cluster advertises the
  // same VIP set — kube-vip leader election within the cluster
  // settles which CP VM owns the apiserver VIP at any moment.
  repeated string cluster_vips = 7;
}

// --- Agent registration ---

message RegisterHostRequest {
  string hostname = 1;
  uint32 total_cpu = 2;
  uint64 total_memory_mib = 3;
  uint64 total_disk_gib = 4;
  repeated GPUDevice gpus = 5;
  // IP address the agent will use as the source for outgoing VXLAN
  // frames. Almost always the uplink interface's address. Reported
  // once at registration; the controller stores it on `hosts` and
  // includes it in `ClusterState.vtep_addresses` broadcasts.
  string vtep_address = 6;
  // Operator-assigned placement preference. Lower wins. The
  // scheduler uses this as a tiebreaker after capacity + GPU
  // topology + anti-affinity, so two equally-good hosts go to the
  // lower-rank one. Default 0 = "no preference"; bump deprioritized
  // hosts (e.g. consumer-disk boxes that shouldn't carry etcd) to a
  // higher number. Reported once at registration and stored on
  // `hosts`; change requires a basis-agent restart.
  uint32 rank = 7;
}

// Liveness ping. The controller learns *which* host this came from
// from the authenticated bidi stream's identity, not from any field
// in this message — a malicious agent could otherwise keep another
// host marked healthy. Empty body kept (rather than dropping the RPC)
// so we can extend it later without a streaming-protocol break.
message HeartbeatRequest {}

message ReportVMStateRequest {
  string vm_id = 1;
  MachineState state = 2;
  string error_message = 3;
  bool transient = 4;
}

// --- Controller -> Agent commands ---

message CreateVMCommand {
  string vm_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  // Primary IP (on the cluster's VXLAN); gateway is the cluster's
  // anycast gateway and prefix is the cluster's.
  string ip_address = 8;
  string gateway = 9;
  uint32 prefix_len = 10;
  uint32 gpus = 11;
  GPUConstraints gpu_constraints = 12;
  repeated string dns_servers = 13;
  repeated string gpu_pci_addresses = 14;
  repeated ExtraDisk extra_disks = 15;
  // VXLAN Network Identifier of the cluster this VM joins at L2. The
  // agent derives the bridge name (`brc<vni>`) from this and attaches
  // the VM's primary TAP to it. The bridge itself is kept alive by
  // `ReconcileHostCommand` — which precedes this command on the same
  // mpsc stream whenever a new cluster shows up on the host.
  uint32 vni = 16;
}

message DeleteVMCommand {
  string vm_id = 1;
}
