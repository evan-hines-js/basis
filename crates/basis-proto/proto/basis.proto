syntax = "proto3";
package basis.v1;

// CAPI-facing service — called by basis-capi-provider running in Kubernetes.
//
// Two-level model: a caller first creates a Cluster (reserves a VIP and
// binds an IP pool), then creates Machines inside that cluster. All VM
// placement decisions (host, GPUs, IP) belong to the controller — callers
// describe intent, not placement.
service Basis {
  rpc CreateCluster(CreateClusterRequest) returns (CreateClusterResponse);
  rpc DeleteCluster(DeleteClusterRequest) returns (DeleteClusterResponse);
  rpc GetCluster(GetClusterRequest) returns (Cluster);
  rpc ListClusters(ListClustersRequest) returns (ListClustersResponse);

  rpc CreateMachine(CreateMachineRequest) returns (CreateMachineResponse);
  rpc DeleteMachine(DeleteMachineRequest) returns (DeleteMachineResponse);
  rpc GetMachine(GetMachineRequest) returns (Machine);
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);
}

// Agent-facing service — agents connect outbound and receive commands over
// a bidirectional stream. This matches Lattice's outbound-only architecture:
// agents need zero inbound firewall rules.
service BasisAgent {
  rpc StreamMessages(stream AgentMessage) returns (stream ControllerCommand);
}

// --- Cluster messages ---

message CreateClusterRequest {
  // Human-readable cluster name. Must be unique across the Basis
  // controller. Used in logs and as the `cluster` label on VMs.
  string name = 1;
  // Name of the IP pool (configured in controller.toml) to allocate
  // VM IPs and a control-plane VIP from for this cluster.
  string ip_pool = 2;
}

message CreateClusterResponse {
  string cluster_id = 1;
  // Control-plane endpoint VIP, allocated by the controller from the
  // pool's `vip_range` sub-range. kube-vip inside the first control-
  // plane guest claims this address via gratuitous ARP. The caller
  // records this on its `InfrastructureCluster` CR so the rest of CAPI
  // can read it from `Cluster.spec.controlPlaneEndpoint`.
  string control_plane_endpoint = 2;
}

message DeleteClusterRequest {
  string cluster_id = 1;
}

message DeleteClusterResponse {}

message GetClusterRequest {
  string cluster_id = 1;
}

message Cluster {
  string cluster_id = 1;
  string name = 2;
  string ip_pool = 3;
  string control_plane_endpoint = 4;
}

message ListClustersRequest {}

message ListClustersResponse {
  repeated Cluster clusters = 1;
}

// --- Machine messages ---

message CreateMachineRequest {
  // Cluster this machine belongs to. Returned from CreateCluster.
  string cluster_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  uint32 gpus = 8;
  GPUConstraints gpu_constraints = 9;
}

message CreateMachineResponse {
  string id = 1;
  string provider_id = 2;
  string ip_address = 3;
  string host = 4;
}

message DeleteMachineRequest {
  string id = 1;
}

message DeleteMachineResponse {}

message GetMachineRequest {
  string id = 1;
}

message ListMachinesRequest {
  // Filter by cluster_id. Empty string means all clusters.
  string cluster_id = 1;
}

message ListMachinesResponse {
  repeated Machine machines = 1;
}

message Machine {
  string id = 1;
  string name = 2;
  string cluster_id = 3;
  string host = 4;
  string provider_id = 5;
  string ip_address = 6;
  MachineState state = 7;
  uint32 cpu = 8;
  uint32 memory_mib = 9;
  uint32 disk_gib = 10;
  repeated MachineGPU gpus = 11;
}

// GPU detail exposed to CAPI consumers. Strictly a subset of the internal
// `GPUDevice`: iommu groups are a host-internal passthrough detail the
// scheduler needs, but CAPI has no use for them and they shouldn't leak
// out on the read path.
message MachineGPU {
  string pci_address = 1;
  string model = 2;
  uint32 nvlink_group = 3;
}

enum MachineState {
  PENDING = 0;
  CREATING = 1;
  RUNNING = 2;
  STOPPING = 3;
  STOPPED = 4;
  FAILED = 5;
}

message GPUConstraints {
  uint32 min_group_size = 1;
}

message GPUDevice {
  string pci_address = 1;
  string model = 2;
  string iommu_group = 3;
  uint32 nvlink_group = 4;
}

// --- Agent stream messages ---

message AgentMessage {
  oneof payload {
    RegisterHostRequest register = 1;
    HeartbeatRequest heartbeat = 2;
    ReportVMStateRequest vm_state = 3;
  }
}

message ControllerCommand {
  string request_id = 1;
  oneof command {
    CreateVMCommand create_vm = 2;
    DeleteVMCommand delete_vm = 3;
    RegisterHostResponse register_ack = 4;
    ReconcileHostCommand reconcile_host = 5;
  }
}

// Periodic authoritative VM list for this host. Carries the same contract
// as `RegisterHostResponse.expected_vm_ids` but fires on an interval while
// the agent is already connected — so a controller that loses track of a
// VM (e.g. a fire-and-forget DeleteVm that dropped) is still converged on
// without requiring the agent to reconnect. The agent deletes any local
// VM not in this list.
message ReconcileHostCommand {
  repeated string expected_vm_ids = 1;
}

// Sent as the first command after the agent's RegisterHostRequest.
//
// The controller is authoritative: `expected_vm_ids` is the complete list
// of VMs this host should have. The agent MUST delete any local VM not in
// this list before reporting state — those VMs were forgotten by the
// controller (e.g., deleted while the agent was offline) and their disks
// and tap devices are garbage.
message RegisterHostResponse {
  string host_id = 1;
  repeated string expected_vm_ids = 2;
}

// --- Agent registration ---

message RegisterHostRequest {
  string hostname = 1;
  uint32 total_cpu = 2;
  uint64 total_memory_mib = 3;
  uint64 total_disk_gib = 4;
  // Per-GPU iommu_group is carried inside each GPUDevice; no separate
  // aggregate field needed.
  repeated GPUDevice gpus = 5;
}

// Agent liveness signal. The controller is authoritative for capacity:
// `available = total - sum(vms on host)` is computed server-side at
// scheduling time from the VM table. The agent only needs to tell the
// controller it is alive.
message HeartbeatRequest {
  string host_id = 1;
}

message ReportVMStateRequest {
  string vm_id = 1;
  MachineState state = 2;
  string error_message = 3;
  // True when the failure is a load-shedding signal (e.g., the LVM
  // mutation semaphore timed out because the agent couldn't keep up
  // with arrival rate) rather than a real fault. The controller maps
  // this to a transient RPC status (`Unavailable`) so callers retry
  // instead of alerting, and labels the result as `busy` in metrics.
  // Ignored for state=RUNNING.
  bool transient = 4;
}

// --- Controller -> Agent commands ---

message CreateVMCommand {
  string vm_id = 1;
  string name = 2;
  uint32 cpu = 3;
  uint32 memory_mib = 4;
  uint32 disk_gib = 5;
  string image = 6;
  bytes bootstrap_data = 7;
  string ip_address = 8;
  string gateway = 9;
  uint32 prefix_len = 10;
  uint32 gpus = 11;
  GPUConstraints gpu_constraints = 12;
  repeated string dns_servers = 13;
  // PCI addresses of GPUs selected by the scheduler. The agent binds
  // these to vfio-pci and passes them to cloud-hypervisor.
  repeated string gpu_pci_addresses = 14;
}

message DeleteVMCommand {
  string vm_id = 1;
}
